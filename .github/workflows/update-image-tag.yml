name: update-image-tag

on:
  repository_dispatch:
    types: [update-image]

jobs:
  update-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Read app registry and update tags
        env:
          APP_NAME: ${{ github.event.client_payload.app }}
          NEW_TAG: ${{ github.event.client_payload.tag }}
          ENV_FILTER: ${{ github.event.client_payload.env }}
        run: |
          REGISTRY="ci/app-registry.yaml"

          if ! yq e ".apps.\"${APP_NAME}\"" "$REGISTRY" | grep -q "type:"; then
            echo "::error::App '${APP_NAME}' not found in ${REGISTRY}"
            exit 1
          fi

          TYPE=$(yq e ".apps.\"${APP_NAME}\".type" "$REGISTRY")

          # Detect path format: objects ({path, env}) vs plain strings
          HAS_PATH_FIELD=$(yq e ".apps.\"${APP_NAME}\".paths[0].path // \"\"" "$REGISTRY")

          if [ -n "$HAS_PATH_FIELD" ]; then
            # Object format — filter by env if provided, otherwise update all
            if [ -n "$ENV_FILTER" ]; then
              PATHS=$(yq e ".apps.\"${APP_NAME}\".paths[] | select(.env == \"${ENV_FILTER}\") | .path" "$REGISTRY")
            else
              PATHS=$(yq e ".apps.\"${APP_NAME}\".paths[].path" "$REGISTRY")
            fi
          else
            # Legacy flat string format — update all paths
            PATHS=$(yq e ".apps.\"${APP_NAME}\".paths[]" "$REGISTRY")
          fi

          if [ -z "$PATHS" ]; then
            echo "::error::No paths found for app '${APP_NAME}' (env filter: '${ENV_FILTER}')"
            exit 1
          fi

          for FILE_PATH in $PATHS; do
            if [ ! -f "$FILE_PATH" ]; then
              echo "::warning::Path ${FILE_PATH} does not exist, skipping"
              continue
            fi

            if [ "$TYPE" = "kustomization" ]; then
              yq e -i "(. | .images[] | select(.name == \"*\")).newTag = \"${NEW_TAG}\"" "$FILE_PATH"
              echo "Updated newTag in ${FILE_PATH}"
            elif [ "$TYPE" = "values" ]; then
              yq e -i ".image.tag = \"${NEW_TAG}\"" "$FILE_PATH"
              echo "Updated image.tag in ${FILE_PATH}"
            else
              echo "::error::Unknown type '${TYPE}' for app '${APP_NAME}'"
              exit 1
            fi

            # Also update migrate-job.yaml in the same directory if it exists
            MIGRATE_JOB="$(dirname "$FILE_PATH")/migrate-job.yaml"
            if [ -f "$MIGRATE_JOB" ]; then
              REPO=$(yq e '.image.repository' "$FILE_PATH")
              sed -i "s|image: ${REPO}:.*|image: ${REPO}:${NEW_TAG}|" "$MIGRATE_JOB"
              echo "Updated migrate-job image in ${MIGRATE_JOB}"
            fi
          done

      - name: Commit and push
        env:
          APP_NAME: ${{ github.event.client_payload.app }}
          NEW_TAG: ${{ github.event.client_payload.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update ${APP_NAME} image to ${NEW_TAG}"
          git push

  promote-to-prod:
    needs: update-tag
    if: github.event.client_payload.env == 'dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Check for prod paths
        id: check
        env:
          APP_NAME: ${{ github.event.client_payload.app }}
        run: |
          REGISTRY="ci/app-registry.yaml"
          PROD_PATHS=$(yq e ".apps.\"${APP_NAME}\".paths[] | select(.env == \"prod\") | .path" "$REGISTRY" 2>/dev/null)
          if [ -z "$PROD_PATHS" ]; then
            echo "No prod paths for ${APP_NAME}, skipping promotion"
            echo "has_prod=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_prod=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create promote PR
        if: steps.check.outputs.has_prod == 'true'
        env:
          APP_NAME: ${{ github.event.client_payload.app }}
          NEW_TAG: ${{ github.event.client_payload.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${NEW_TAG:0:7}"
          BRANCH="promote/${APP_NAME}-${SHORT_SHA}"
          REGISTRY="ci/app-registry.yaml"
          TYPE=$(yq e ".apps.\"${APP_NAME}\".type" "$REGISTRY")

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Pull latest (update-tag job may have pushed)
          git pull --rebase origin main

          # Create or reset promote branch
          git checkout -B "$BRANCH"

          PROD_PATHS=$(yq e ".apps.\"${APP_NAME}\".paths[] | select(.env == \"prod\") | .path" "$REGISTRY")
          for FILE_PATH in $PROD_PATHS; do
            if [ ! -f "$FILE_PATH" ]; then
              echo "::warning::Prod path ${FILE_PATH} does not exist, skipping"
              continue
            fi

            if [ "$TYPE" = "values" ]; then
              yq e -i ".image.tag = \"${NEW_TAG}\"" "$FILE_PATH"
            elif [ "$TYPE" = "kustomization" ]; then
              yq e -i "(. | .images[] | select(.name == \"*\")).newTag = \"${NEW_TAG}\"" "$FILE_PATH"
            fi

            # Also update migrate-job.yaml in the same directory
            MIGRATE_JOB="$(dirname "$FILE_PATH")/migrate-job.yaml"
            if [ -f "$MIGRATE_JOB" ]; then
              REPO=$(yq e '.image.repository' "$FILE_PATH")
              sed -i "s|image: ${REPO}:.*|image: ${REPO}:${NEW_TAG}|" "$MIGRATE_JOB"
            fi
          done

          git add -A
          if git diff --cached --quiet; then
            echo "No prod changes to promote"
            exit 0
          fi

          git commit -m "promote: ${APP_NAME} to ${SHORT_SHA}"
          git push -f origin "$BRANCH"

          # Close existing promote PRs for this app
          EXISTING=$(gh pr list --search "head:promote/${APP_NAME}-" --json number --jq '.[].number' 2>/dev/null || true)
          for PR_NUM in $EXISTING; do
            gh pr close "$PR_NUM" --delete-branch 2>/dev/null || true
          done

          gh pr create \
            --title "promote: ${APP_NAME} to ${SHORT_SHA}" \
            --body "$(cat <<EOF
          ## Promote ${APP_NAME} to production

          **Image tag:** \`${NEW_TAG}\`
          **Dev deployment:** Verify at the dev URL before merging.

          Merging this PR will deploy to production via ArgoCD.

          ---
          *Auto-generated by CI*
          EOF
          )" \
            --base main \
            --head "$BRANCH"
