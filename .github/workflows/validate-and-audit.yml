name: validate-and-audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  kustomize-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cluster:
          - 1276-core
          - 1276-dev
          - 1276-prod
          - 1501-prod
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Install helm
        uses: azure/setup-helm@v4

      - name: Find all kustomization dirs
        id: dirs
        run: |
          DIRS=$(find "kubernetes/clusters/${{ matrix.cluster }}" \
            -name kustomization.yaml -exec dirname {} \; \
            | grep -v '_namespace' \
            | grep -v 'example' \
            | sort)
          echo "dirs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIRS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Kustomize build each app
        run: |
          FAILED=0
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            echo "::group::Building $dir"
            if kustomize build "$dir" --enable-helm > /dev/null 2>&1; then
              echo "OK: $dir"
            else
              echo "::error::FAILED: $dir"
              kustomize build "$dir" --enable-helm 2>&1 || true
              FAILED=1
            fi
            echo "::endgroup::"
          done <<< "${{ steps.dirs.outputs.dirs }}"
          exit $FAILED

  shared-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Install helm
        uses: azure/setup-helm@v4

      - name: Build shared cluster resources
        run: |
          FAILED=0
          for dir in $(find kubernetes/clusters/shared -name kustomization.yaml \
            -exec dirname {} \; | grep -v '_namespace' | sort); do
            echo "::group::Building $dir"
            if kustomize build "$dir" --enable-helm > /dev/null 2>&1; then
              echo "OK: $dir"
            else
              echo "::error::FAILED: $dir"
              kustomize build "$dir" --enable-helm 2>&1 || true
              FAILED=1
            fi
            echo "::endgroup::"
          done
          exit $FAILED

  helm-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install helm
        uses: azure/setup-helm@v4

      - name: Template generic-service chart
        run: |
          helm template test helm-charts/generic-service \
            --set image.repository=test \
            --set image.tag=latest

      - name: Template namespace chart
        run: |
          helm template test helm-charts/namespace \
            --set name=test

  alert-on-failure:
    runs-on: ubuntu-latest
    needs: [kustomize-build, shared-build, helm-template]
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub issue for broken main
        uses: actions/github-script@v8
        with:
          script: |
            const run_url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commit = context.sha.substring(0, 7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Validation failed on main (${commit})`,
              body: `## Automated validation failure\n\nCommit: ${context.sha}\nWorkflow run: ${run_url}\n\nKustomize build or Helm template failed after merge to main. Check the workflow run for details.\n\nThis may have been caused by a Renovate auto-merge.`,
              labels: []
            });
