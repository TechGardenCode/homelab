image:
  repository: ""
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

serviceAccount:
  annotations: {}

podLabels: {}
podAnnotations: {}

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

hostNetwork: false

ports: []
# - name: ""
#   containerPort: 0
#   protocol: TCP

service:
  type: ClusterIP
  externalTrafficPolicy: ""
  loadBalancerIP: ""

health:
  enabled: true
  startupProbeSeconds: 60
  port: main
  type: HTTP
  path: /

# Exposure tiers:
#   Tier 1 (Internal):  gateway.internal.enabled: true (default) → A record in Technitium
#   Tier 2 (Public):    gateway.public.enabled: true → CNAME in Cloudflare (proxied)
#   Tier 3 (Tunnel):    Tier 2 + wildcard cloudflared route (automatic for *.techgarden.gg etc)
httpRoute:
  enabled: false
  hostname: ""
  path: /
  pathType: PathPrefix
  annotations: {}

gateway:
  namespace: envoy-gateway-system
  internal:
    enabled: true
    name: eg-internal
  public:
    enabled: false
    name: eg-public
    tunnelTarget: ""

backendTrafficPolicy:
  # Default-on so every HTTPRoute gets per-IP rate-limit isolation.
  # Complements app-layer rate limiting (where available) and prevents
  # one rogue caller from exhausting the shared gateway budget for
  # unrelated apps. Opt out per-app if truly needed.
  enabled: true
  rateLimit:
    enabled: true
    # Generous per-IP floor. App-level limiters (e.g. hausparty Phase 2)
    # are tighter and catch specific abuse patterns; this bucket is the
    # safety net at the edge for apps without app-layer limits.
    perIPRequestsPerMinute: 600
  routingMode: single  # single | active-active | sticky
  healthCheckPath: /healthz
  stickyTTL: "3600s"

replicas: 1
# HPA: opt-in per-app via autoscaling.enabled. When enabled, the
# Deployment omits spec.replicas entirely so HPA owns scaling (avoids
# Helm-vs-HPA ping-pong). Requires resources.requests.cpu for CPU
# target; same for memory if configured.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: ~
strategyType: RollingUpdate

resources:
  {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

terminationGracePeriodSeconds: 30

