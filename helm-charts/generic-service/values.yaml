image:
  repository: ""
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

serviceAccount:
  annotations: {}

podLabels: {}
podAnnotations: {}

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

hostNetwork: false

ports: []
# - name: ""
#   containerPort: 0
#   protocol: TCP

service:
  type: ClusterIP
  externalTrafficPolicy: ""
  loadBalancerIP: ""

health:
  enabled: true
  startupProbeSeconds: 60
  port: main
  type: HTTP
  path: /

# Exposure tiers:
#   Tier 1 (Internal):  gatewayRef.name: eg-internal (default)
#   Tier 2 (Public):    gatewayRef.name: eg-public (Cloudflare IPs only)
#   Tier 3 (Tunnel):    Tier 2 + entry in cluster's cloudflared configmap
httpRoute:
  enabled: false
  hostname: ""
  path: /
  pathType: PathPrefix
  gatewayRef:
    name: eg-internal
    namespace: envoy-gateway-system
  annotations: {}

backendTrafficPolicy:
  enabled: false
  routingMode: single  # single | active-active | sticky
  healthCheckPath: /healthz
  stickyTTL: "3600s"

replicas: 1
strategyType: RollingUpdate

resources:
  {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

terminationGracePeriodSeconds: 30

command: []
args: []

envs: []

secretEnvs: []

configMaps: []
# - name: ""
#   defaultMode: 0644
#   mountPath: ""
#   subPath: ""
#   content: ""

hostPaths: []
# - name: ""
#   hostPath: ""
#   containerPath: ""
#   readOnly: false
#   type: "DirectoryOrCreate"

emptyDirs: []

# - name: ""
#   containerPath: ""

envsubst:
  image:
    repository: nixery.dev/shell/envsubst
    tag: "latest"
  files: []
  # - src:
  #   dest:

