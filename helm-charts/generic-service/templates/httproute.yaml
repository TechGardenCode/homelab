{{- if and .Values.ports .Values.httpRoute.enabled .Values.gateway.internal.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "generic-service.name" . }}
  labels:
    {{- include "generic-service.labels" . | nindent 4 }}
  annotations:
    external-dns.alpha.kubernetes.io/controller: internal
    {{- with .Values.httpRoute.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.internal.name }}
      namespace: {{ .Values.gateway.namespace }}
  hostnames:
    - {{ .Values.httpRoute.hostname }}
  rules:
    - matches:
        - path:
            type: {{ .Values.httpRoute.pathType }}
            value: {{ .Values.httpRoute.path }}
      backendRefs:
        - name: {{ include "generic-service.name" . }}
          port: {{ (index .Values.ports 0).containerPort }}
{{- end }}
