apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: bitwarden-bootstrap-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: bitwarden-bootstrap-certificate
  namespace: cert-manager
spec:
  isCA: true
  # Long-lived CA: cert-manager does NOT re-issue leaf certs when their CA
  # rotates, so a 90d default CA + rotationPolicy Always left the sdk-server
  # leaf chained to an expired CA (2026-07-02 outage: every ExternalSecret
  # failed x509 verification). A decade-stable CA removes the rotation
  # interleave; the leaf below it renews yearly against the same CA.
  duration: 87600h # 10y
  secretName: bitwarden-bootstrap-certs
  subject:
    organizations:
      - external-secrets.io
  dnsNames:
    - external-secrets-bitwarden-sdk-server.platform.svc.cluster.local
    - bitwarden-sdk-server.platform.svc.cluster.local
    - localhost
  ipAddresses:
    - 127.0.0.1
    - ::1
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 2048
    rotationPolicy: Always
  issuerRef:
    name: bitwarden-bootstrap-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: bitwarden-certificate-issuer
spec:
  ca:
    secretName: bitwarden-bootstrap-certs
