alloy:
  configMap:
    content: |
      // ── Discovery ──
      discovery.kubernetes "nodes" {
        role = "node"
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      // Add cluster label from node name (talos-core-s1 → talos-core)
      discovery.relabel "nodes_with_cluster" {
        targets = discovery.kubernetes.nodes.targets
        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          regex = "(.+)-s\\d+"
          target_label = "cluster"
        }
      }

      // ── Metrics scraping ──
      prometheus.scrape "kube_state_metrics" {
        targets = [{
          __address__ = "kube-state-metrics.monitoring.svc:8080",
        }]
        forward_to = [prometheus.relabel.add_cluster.receiver]
        scrape_interval = "30s"
      }

      prometheus.scrape "kubelet" {
        targets = discovery.relabel.nodes_with_cluster.output
        scheme = "https"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          insecure_skip_verify = true
        }
        forward_to = [prometheus.remote_write.lgtm.receiver]
        scrape_interval = "30s"
      }

      prometheus.scrape "cadvisor" {
        targets = discovery.relabel.nodes_with_cluster.output
        scheme = "https"
        metrics_path = "/metrics/cadvisor"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          insecure_skip_verify = true
        }
        forward_to = [prometheus.remote_write.lgtm.receiver]
        scrape_interval = "30s"
      }

      // Add cluster label to kube-state-metrics (derives from node label)
      prometheus.relabel "add_cluster" {
        forward_to = [prometheus.remote_write.lgtm.receiver]
        rule {
          source_labels = ["node"]
          regex = "(.+)-s\\d+"
          target_label = "cluster"
        }
      }

      // ── Pod log collection ──
      loki.source.kubernetes "pods" {
        targets = discovery.relabel.pods_with_cluster.output
        forward_to = [loki.write.lgtm.receiver]
      }

      discovery.relabel "pods_with_cluster" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          regex = "(.+)-s\\d+"
          target_label = "cluster"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label = "container"
        }
      }

      // ── Remote write to LGTM stack ──
      prometheus.remote_write "lgtm" {
        endpoint {
          url = "http://10.0.60.160:9090/api/v1/write"
        }
      }

      loki.write "lgtm" {
        endpoint {
          url = "http://10.0.60.160:3100/loki/api/v1/push"
        }
      }

controller:
  type: daemonset

resources:
  requests:
    cpu: 100m
    memory: 384Mi
  limits:
    memory: 768Mi

serviceAccount:
  create: true

rbac:
  create: true
