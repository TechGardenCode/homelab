alloy:
  configMap:
    content: |
      // ── Discovery ──
      discovery.kubernetes "nodes" {
        role = "node"
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      // Add cluster label from node name (talos-core-s1 → talos-core)
      discovery.relabel "nodes_with_cluster" {
        targets = discovery.kubernetes.nodes.targets
        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          regex = "(.+)-s\\d+"
          target_label = "cluster"
        }
      }

      // ── Metrics scraping ──
      prometheus.scrape "kube_state_metrics" {
        targets = [{
          __address__ = "kube-state-metrics.monitoring.svc:8080",
        }]
        forward_to = [prometheus.relabel.add_cluster.receiver]
        scrape_interval = "30s"
        clustering {
          enabled = true
        }
      }

      prometheus.scrape "kubelet" {
        targets = discovery.relabel.nodes_with_cluster.output
        scheme = "https"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          insecure_skip_verify = true
        }
        forward_to = [prometheus.remote_write.lgtm.receiver]
        scrape_interval = "30s"
      }

      prometheus.scrape "cadvisor" {
        targets = discovery.relabel.nodes_with_cluster.output
        scheme = "https"
        metrics_path = "/metrics/cadvisor"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          insecure_skip_verify = true
        }
        forward_to = [prometheus.remote_write.lgtm.receiver]
        scrape_interval = "30s"
      }

      // ── CNPG (CloudNativePG) metrics ──
      // Each CNPG Cluster pod exposes postgres_exporter metrics on :9187.
      // Discover by label `cnpg.io/podRole=instance`.
      discovery.relabel "cnpg_instances" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_label_cnpg_io_podRole"]
          regex         = "instance"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_port_number"]
          regex         = "9187"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          regex         = "(.+)-s\\d+"
          target_label  = "cluster"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_cnpg_io_cluster"]
          target_label  = "cnpg_cluster"
        }
      }

      prometheus.scrape "cnpg" {
        targets         = discovery.relabel.cnpg_instances.output
        forward_to      = [prometheus.remote_write.lgtm.receiver]
        scrape_interval = "30s"
        scrape_timeout  = "10s"
      }

      // ── PgBouncer (CNPG Pooler) metrics ──
      // Each Pooler pod runs the PgBouncer process plus a metrics exporter
      // container that listens on :9127. Discover by label
      // `cnpg.io/poolerName`.
      discovery.relabel "pgbouncer_pods" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_label_cnpg_io_poolerName"]
          regex         = ".+"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_port_number"]
          regex         = "9127"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          regex         = "(.+)-s\\d+"
          target_label  = "cluster"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_cnpg_io_poolerName"]
          target_label  = "pooler"
        }
      }

      prometheus.scrape "pgbouncer" {
        targets         = discovery.relabel.pgbouncer_pods.output
        forward_to      = [prometheus.remote_write.lgtm.receiver]
        scrape_interval = "30s"
        scrape_timeout  = "10s"
      }

      // Add cluster label to kube-state-metrics
      // KSM pod metrics lack a "node" label, so fall back to the Alloy
      // pod's own node name (K8S_NODE_NAME) to derive the cluster.
      prometheus.relabel "add_cluster" {
        forward_to = [prometheus.remote_write.lgtm.receiver]
        rule {
          target_label = "__tmp_node"
          replacement  = env("K8S_NODE_NAME")
        }
        rule {
          source_labels = ["node"]
          regex         = ".+"
          target_label  = "__tmp_node"
        }
        rule {
          source_labels = ["__tmp_node"]
          regex         = "(.+)-s\\d+"
          target_label  = "cluster"
        }
        rule {
          action       = "labeldrop"
          regex        = "__tmp_node"
        }
      }

      // ── Pod log collection ──
      loki.source.kubernetes "pods" {
        targets = discovery.relabel.pods_with_cluster.output
        forward_to = [loki.write.lgtm.receiver]
      }

      discovery.relabel "pods_with_cluster" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          regex = "(.+)-s\\d+"
          target_label = "cluster"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label = "container"
        }
      }

      // ── Remote write to LGTM stack ──
      prometheus.remote_write "lgtm" {
        endpoint {
          url = "http://10.0.60.160:9090/api/v1/write"
        }
      }

      loki.write "lgtm" {
        endpoint {
          url = "http://10.0.60.160:3100/loki/api/v1/push"
          batch_wait  = "5s"
          batch_size  = "1MiB"
        }
        external_labels = {}
      }

  clustering:
    enabled: true

  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      memory: 768Mi

controller:
  type: daemonset

serviceAccount:
  create: true

rbac:
  create: true
