policy: upsert-only

registry: noop

extraArgs:
  - "--annotation-filter=dns.kian.sh/provider=cloudflare"
  - "--cloudflare-proxied"

sources:
  - gateway-httproute

provider:
  name: cloudflare

env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-external-dns
        key: CF_API_TOKEN
