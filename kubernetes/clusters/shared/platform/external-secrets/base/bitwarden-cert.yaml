apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: bitwarden-tls-certs
  namespace: platform
spec:
  secretName: bitwarden-tls-certs
  # 1y leaf against the decade-stable bootstrap CA (see bitwarden-issuer.yaml):
  # yearly renewals can no longer interleave with a CA rotation. Note:
  # cert-manager does NOT re-issue on duration changes — the 2026-07-02 outage
  # remediation deleted bitwarden-bootstrap-certs + this secret to force both.
  duration: 8760h # 1y
  dnsNames:
    - bitwarden-sdk-server.platform.svc.cluster.local
    - external-secrets-bitwarden-sdk-server.platform.svc.cluster.local
    - localhost
  ipAddresses:
    - 127.0.0.1
    - ::1
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 2048
    rotationPolicy: Always
  issuerRef:
    name: bitwarden-certificate-issuer
    kind: ClusterIssuer
    group: cert-manager.io