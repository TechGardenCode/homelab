policy: upsert-only

registry: noop

extraArgs:
  - "--pihole-api-version=6"
  - "--annotation-filter=dns.kian.sh/provider=internal"

sources:
  - service
  - ingress
  - gateway-httproute

provider:
  name: pihole

env:
  - name: EXTERNAL_DNS_PIHOLE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: technitium-dns
        key: EXTERNAL_DNS_PIHOLE_PASSWORD
  - name: EXTERNAL_DNS_PIHOLE_SERVER
    valueFrom:
      secretKeyRef:
        name: technitium-dns
        key: EXTERNAL_DNS_PIHOLE_SERVER
