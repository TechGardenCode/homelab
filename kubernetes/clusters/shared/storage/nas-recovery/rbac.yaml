---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nas-recovery
  namespace: storage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nas-recovery
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nas-recovery
subjects:
  - kind: ServiceAccount
    name: nas-recovery
    namespace: storage
roleRef:
  kind: ClusterRole
  name: nas-recovery
  apiGroup: rbac.authorization.k8s.io
