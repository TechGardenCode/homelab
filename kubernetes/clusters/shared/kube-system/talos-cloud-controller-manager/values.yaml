# talos-cloud-controller-manager — values for homelab clusters.
# Single replica is fine for a 3-CP homelab; uses leader election so HA isn't
# needed. nodeSelector + tolerations match the chart defaults (control-plane
# only). The chart's default enabled controllers (cloud-node, node-csr-approval)
# cover what we need.
#
# Transformations are left empty: this homelab doesn't currently have richer
# per-node metadata (no cloud region/zone) to map into K8s labels. Add later
# if/when nodes carry distinguishing metadata via Talos platformMetadata.

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi
