# DDoS floor only. Per-app rate limiting is the job of each HTTPRoute's
# own BackendTrafficPolicy (generic-service chart default since 43d5410).
# This policy catches truly pathological volume across the whole gateway
# before it reaches any route — legitimate per-IP traffic should never
# approach 30000 req/min against a single cluster ingress.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: internal-rate-limit
  namespace: envoy-gateway-system
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: eg-internal
  rateLimit:
    type: Local
    local:
      rules:
        - limit:
            requests: 30000
            unit: Minute
          clientSelectors:
            - sourceCIDR:
                value: 0.0.0.0/0
                type: Distinct
