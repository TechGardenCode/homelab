image:
  repository: "ghcr.io/techgardencode/kian.coffee"
  tag: "a1901b8fd7c959c93cb64ca04fa13eaaf20961b2"
ports:
  - name: main
    containerPort: 4000
service:
  type: ClusterIP
# nginx serves /health directly — the generic-service chart's default
# probe target (`/`) would also work, but /health skips rendering the
# full home page on every probe.
health:
  path: /health
# Telemetry: browser SDK config is injected at pod start by
# docker/30-runtime-config.sh (in the app image) via envsubst. Shares the
# prod GlitchTip + OpenPanel projects with 1276-prod so telemetry collapses
# to a single prod surface across both clusters.
envs:
  - APP_ENV: "prod"
secretEnvs:
  - OPENPANEL_CLIENT_ID: "openpanel-client-id"
  - GLITCHTIP_DSN: "glitchtip-dsn"
# Exposure: Tier 3 (Cloudflare Tunnel) + Internal
httpRoute:
  enabled: true
  hostname: kian.coffee
gateway:
  internal:
    enabled: true
  public:
    enabled: true
    tunnelTarget: 9221faf4-41f8-4aa6-9cbc-1b757c2a2c07.cfargotunnel.com
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 512Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
# Paired with readOnlyRootFilesystem above. nginx needs /var/cache/nginx
# + /var/run writable at startup; /tmp is general scratch.
emptyDirs:
  - name: tmp
    containerPath: /tmp
  - name: nginx-cache
    containerPath: /var/cache/nginx
  - name: nginx-run
    containerPath: /var/run
