image:
  repository: "ghcr.io/techgardencode/kian.coffee"
  tag: "f24f7042b654eb03ec94e1ecacfe1d0809933b60"
ports:
  - name: main
    containerPort: 4000
service:
  type: ClusterIP
# nginx serves /health directly — the generic-service chart's default
# probe target (`/`) would also work, but /health skips rendering the
# full home page on every probe.
health:
  path: /health
# Exposure: Tier 3 (Cloudflare Tunnel) + Internal
httpRoute:
  enabled: true
  hostname: kian.coffee
gateway:
  internal:
    enabled: true
  public:
    enabled: true
    tunnelTarget: 9221faf4-41f8-4aa6-9cbc-1b757c2a2c07.cfargotunnel.com
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 512Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
# Paired with readOnlyRootFilesystem above. nginx needs /var/cache/nginx
# + /var/run writable at startup; /tmp is general scratch.
emptyDirs:
  - name: tmp
    containerPath: /tmp
  - name: nginx-cache
    containerPath: /var/cache/nginx
  - name: nginx-run
    containerPath: /var/run
