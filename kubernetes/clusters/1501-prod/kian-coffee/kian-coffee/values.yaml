image:
  repository: "ghcr.io/techgardencode/kian.coffee"
  tag: "094376124bd2b58390254dd83a7781cbcb289fd1"
ports:
  - name: main
    containerPort: 4000
service:
  type: LoadBalancer
# SSR runtime exposes a dedicated /health endpoint for probes — the
# generic-service chart defaults to `/`, which returns a full SSR render.
health:
  path: /health
ingress:
  public: true
  annotations:
    cert-manager.io/issuer-group: certmanager.step.sm
    cert-manager.io/issuer-kind: StepClusterIssuer
    cert-manager.io/issuer: step-issuer
  host: coffee.1501.internal.kian.sh
  tls:
    secretName: coffee.1501.internal.kian.sh
