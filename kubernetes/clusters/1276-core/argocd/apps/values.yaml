  1276-core:
    name: 1276-core
    generators:
      - git:
          repoURL: https://github.com/techgardencode/homelab.git
          revision: main
          directories:
            # - path: "kubernetes/clusters/1276-core/**/*"
            #   exclude: true
            - path: "kubernetes/clusters/shared/external-dns/*"
              exclude: true
            - path: "kubernetes/clusters/shared/**/*"
            - path: "kubernetes/clusters/1276-core/argocd/*"
            - path: "kubernetes/clusters/1276-core/metallb-system/*"
            - path: "kubernetes/clusters/1276-core/envoy-gateway-system/*"
            - path: "kubernetes/clusters/1276-core/democratic-csi/*"
            - path: "kubernetes/clusters/1276-core/pki/*"
            - path: "kubernetes/clusters/1276-core/cluster-ops/*"
    template:
      metadata:
        name: "1276-core.{{path[3]}}.{{path.basenameNormalized}}"
      spec:
        project: default
        source:
          repoURL: https://github.com/techgardencode/homelab.git
          targetRevision: main
          path: "{{path}}"
          plugin:
            name: kustomize-helm
            parameters:
              - name: NAMESPACE
                string: "{{path[3]}}"
        destination:
          name: in-cluster
          namespace: "{{path[3]}}"
        syncPolicy:
          automated:
            selfHeal: true
            prune: true
          syncOptions:
            - ApplyOutOfSyncOnly=true
            - ServerSideApply=true
