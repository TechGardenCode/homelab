applicationsets:
  1276-dev:
    name: 1276-dev
    namespace: argocd
    generators:
      - git:
          repoURL: https://github.com/techgardencode/homelab.git
          revision: main
          directories:
            - path: "kubernetes/clusters/shared/**/*"
            - path: "kubernetes/clusters/shared/external-dns/*"
              exclude: true
            - path: "kubernetes/clusters/1276-dev/**/*"
            - path: "kubernetes/clusters/1276-dev/techgarden/*"
              exclude: true
    template:
      metadata:
        name: "1276-dev.{{path[3]}}.{{path.basenameNormalized}}"
      spec:
        project: "1276-dev"
        source:
          repoURL: https://github.com/techgardencode/homelab.git
          targetRevision: main
          path: "{{path}}"
          plugin:
            name: kustomize-helm
            parameters:
              - name: NAMESPACE
                string: "{{path[3]}}"
        destination:
          name: "1276-dev"
          namespace: "{{path[3]}}"
        syncPolicy:
          automated:
            selfHeal: true
            prune: true
          syncOptions:
            - ApplyOutOfSyncOnly=true
            - ServerSideApply=true
  1276-prod:
    name: 1276-prod
    namespace: argocd
    generators:
      - git:
          repoURL: https://github.com/techgardencode/homelab.git
          revision: main
          directories:
            - path: "kubernetes/clusters/shared/**/*"
            - path: "kubernetes/clusters/shared/external-dns/*"
              exclude: true
            - path: "kubernetes/clusters/1276-prod/**/*"
            - path: "kubernetes/clusters/1276-prod/techgarden/*"
              exclude: true
    template:
      metadata:
        name: "1276-prod.{{path[3]}}.{{path.basenameNormalized}}"
      spec:
        project: "1276-prod"
        source:
          repoURL: https://github.com/techgardencode/homelab.git
          targetRevision: main
          path: "{{path}}"
          plugin:
            name: kustomize-helm
            parameters:
              - name: NAMESPACE
                string: "{{path[3]}}"
        destination:
          name: "1276-prod"
          namespace: "{{path[3]}}"
        syncPolicy:
          automated:
            selfHeal: true
            prune: true
          syncOptions:
            - ApplyOutOfSyncOnly=true
            - ServerSideApply=true
