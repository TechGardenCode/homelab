apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - base/externalsecret.yaml
  - base/repo-creds.yaml
  - base/configmap.yaml
  - base/pdb.yaml
  - base/step-ca-configmap.yaml

helmCharts:
  - name: argo-cd
    version: 9.5.22
    releaseName: argocd
    repo: https://argoproj.github.io/argo-helm
    valuesFile: values.yaml
    namespace: argocd
