apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
data:
  config.yaml: |
    tunnel: cd7dfdc4-003d-4ab0-a879-02abdf43e94a
    credentials-file: /etc/cloudflared/credentials.json
    no-autoupdate: true
    ingress:
      - hostname: argocd-webhook.kian.sh
        path: /api/webhook
        service: https://argocd-server.argocd.svc.cluster.local:443
        originRequest:
          noTLSVerify: false
          caPool: /etc/cloudflared/ca/ca.crt
      - hostname: www.techgarden.gg
        service: http://10.0.62.3:80
      - hostname: blog.techgarden.gg
        service: http://10.0.62.3:80
      - hostname: sso.techgarden.gg
        service: https://10.0.62.3:443
        originRequest:
          noTLSVerify: false
          caPool: /etc/cloudflared/ca/ca.crt
      - hostname: ntfy.kian.sh
        service: http://10.0.60.160:8090
      - service: http_status:404
