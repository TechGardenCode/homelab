---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mysql-backup
  namespace: databases
  labels:
    app.kubernetes.io/name: mysql-backup
spec:
  schedule: "15 3 * * *"
  timeZone: Europe/Berlin
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      completions: 1
      parallelism: 1
      template:
        spec:
          restartPolicy: OnFailure
          terminationGracePeriodSeconds: 30
          containers:
            - name: mysql-backup
              image: mysql:8.4
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  mkdir -p /backups/mysql
                  echo "[$(date)] Starting MySQL backup..."
                  mysqldump --all-databases \
                    -h mysql.databases.svc -P 6446 \
                    -u root -p"${MYSQL_ROOT_PASSWORD}" \
                    | gzip > /backups/mysql/mysql-dump-${TIMESTAMP}.sql.gz
                  echo "[$(date)] Backup complete: mysql-dump-${TIMESTAMP}.sql.gz"
                  echo "[$(date)] Cleaning up backups older than 7 days..."
                  find /backups/mysql -name "*.sql.gz" -mtime +7 -delete
                  echo "[$(date)] Done."
              env:
                - name: MYSQL_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mysql-credentials
                      key: rootPassword
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: db-backups
