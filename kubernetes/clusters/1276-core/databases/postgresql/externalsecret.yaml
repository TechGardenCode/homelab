---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgresql-app-credentials
  namespace: databases
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: postgresql-app-credentials
    template:
      data:
        username: appuser
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: "352bfb54-b879-4474-aded-b4140041e6a1"
