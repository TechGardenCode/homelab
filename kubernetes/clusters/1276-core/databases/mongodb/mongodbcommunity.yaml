---
apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: mongodb
  namespace: databases
spec:
  members: 1
  type: ReplicaSet
  version: "7.0.3"

  statefulSet:
    spec:
      template:
        spec:
          containers:
            - name: mongod
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  memory: 384Mi
      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: freenas-iscsi-ssd-csi
            resources:
              requests:
                storage: 10Gi
        - metadata:
            name: logs-volume
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: freenas-iscsi-ssd-csi
            resources:
              requests:
                storage: 2Gi

  security:
    authentication:
      modes:
        - SCRAM

  users:
    - name: admin
      db: admin
      passwordSecretRef:
        name: mongodb-admin-credentials
      scramCredentialsSecretName: mongodb-admin-scram
      roles:
        - name: root
          db: admin

    - name: techgardencode
      db: techgarden
      passwordSecretRef:
        name: mongodb-app-credentials
      scramCredentialsSecretName: mongodb-techgardencode-scram
      roles:
        - name: readWrite
          db: techgarden
        - name: dbAdmin
          db: techgarden
