---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: glitchtip-db
  namespace: observability
spec:
  instances: 1

  enableSuperuserAccess: true
  superuserSecret:
    name: glitchtip-db-superuser

  postgresql:
    pg_hba:
      - host all postgres all scram-sha-256
      - host all all all scram-sha-256

  storage:
    size: 10Gi
    storageClass: freenas-iscsi-ssd-csi

  bootstrap:
    initdb:
      database: glitchtip
      owner: glitchtip
      secret:
        name: glitchtip-db-app-credentials

  monitoring:
    # PodMonitor disabled: 1276-core has no Prometheus Operator CRDs.
    # Alloy scrapes CNPG metrics natively via service discovery.
    enablePodMonitor: false
    disableDefaultQueries: false

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
