---
# Internal route: LAN clients → Technitium → eg-internal → glitchtip-web
# external-dns-internal creates an A record in Technitium via RFC 2136
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: glitchtip-internal
  namespace: observability
  annotations:
    dns.kian.sh/provider: internal
    external-dns.alpha.kubernetes.io/hostname: glitchtip.techgarden.gg
    external-dns.alpha.kubernetes.io/ingress-hostname-source: annotation-only
spec:
  parentRefs:
    - name: eg-internal
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - glitchtip.techgarden.gg
  rules:
    - backendRefs:
        - name: glitchtip-web
          port: 80
