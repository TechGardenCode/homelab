---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: glitchtip-app-secrets
  namespace: observability
  annotations:
    # Apply in ArgoCD's PreSync phase at an early wave so the target
    # Secret is materialized before the chart's migrate Job hook runs
    # (which is PreSync on upgrades, PostSync on first install).
    #
    # ArgoCD waits for hook resources to be Healthy before advancing
    # waves; the built-in ExternalSecret health check reports Healthy
    # only once ESO has written the target Secret, so the downstream
    # Job is guaranteed to find glitchtip-app-secrets when it runs.
    #
    # No hook-delete-policy is set — the ExternalSecret stays resident
    # across syncs and ESO continues reconciling the target Secret
    # normally, so web/worker pods never see secret churn.
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: glitchtip-app-secrets
    template:
      engineVersion: v2
      data:
        SECRET_KEY: "{{ .secretKey }}"
        DATABASE_URL: "postgres://glitchtip:{{ .dbPassword }}@glitchtip-db-rw.observability.svc:5432/glitchtip"
  data:
    - secretKey: secretKey
      remoteRef:
        key: "7639bb8c-5ae8-4aeb-a0c6-b427015dcfa3"
    - secretKey: dbPassword
      remoteRef:
        key: "82cc5ab6-e31b-477c-bfa0-b427015dcf4a"
