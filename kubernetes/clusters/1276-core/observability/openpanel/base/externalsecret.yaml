---
# Creates the openpanel-secrets Secret that the chart's Deployments
# reference via secretKeyRef (the chart's own Secret of the same name
# is removed via a kustomize $patch: delete in ../kustomization.yaml).
#
# Unlike glitchtip, the openpanel chart has NO migration Job and no
# Helm hooks — the API container runs migrations inline on startup.
# We therefore don't need PreSync-hook gymnastics: ExternalSecret is a
# normal Sync-phase resource with a negative sync-wave so it applies
# (and ESO materializes the target Secret) before the Deployments
# land, and pods starting with a missing secret simply wait on
# CreateContainerConfigError until the secret appears.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openpanel-secrets
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: openpanel-secrets
    template:
      engineVersion: v2
      type: Opaque
      data:
        # App secrets
        COOKIE_SECRET: "{{ .cookieSecret }}"

        # Postgres (CNPG openpanel-db in this namespace). OpenPanel is
        # Prisma-based; DATABASE_URL_DIRECT is the non-pooled variant.
        # We don't run a pooler here, so both URLs point at the same
        # rw endpoint.
        DATABASE_URL: "postgresql://openpanel:{{ .dbPassword }}@openpanel-db-rw.observability.svc:5432/openpanel?schema=public"
        DATABASE_URL_DIRECT: "postgresql://openpanel:{{ .dbPassword }}@openpanel-db-rw.observability.svc:5432/openpanel?schema=public"

        # Bundled Redis (op-kv service, default port).
        REDIS_URL: "redis://op-kv:6379"

        # Bundled ClickHouse (op-ch service on HTTP port, openpanel DB
        # created by the chart's init-db.sh).
        CLICKHOUSE_URL: "http://op-ch:8123/openpanel"
  data:
    - secretKey: cookieSecret
      remoteRef:
        key: "233c3402-8ac7-47c8-918b-b427015de48b"
    - secretKey: dbPassword
      remoteRef:
        key: "48590bff-c125-48ce-8547-b427015dcf7b"
