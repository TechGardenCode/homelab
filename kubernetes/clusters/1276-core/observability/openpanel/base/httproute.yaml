---
# openpanel.kian.sh
#
# Path-based split:
#   /api/*  → op-api (with /api prefix STRIPPED; op-api serves tRPC at
#             /trpc/* and its healthcheck at /healthcheck, NOT /api/*)
#   /*      → op-dashboard (web UI, served at root, no rewrite needed)
#
# The chart's default values assume an nginx ingress with
# `rewrite-target: /`, which is why apiUrl is set to .../api and the
# backend isn't mounted under /api. We replicate that rewrite here with
# a Gateway API URLRewrite filter.
#
# external-dns-internal picks up the hostname via annotation and
# publishes the A record to Technitium. TLS is terminated on
# eg-internal using the eg-tls-kian wildcard LE cert.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openpanel
  namespace: observability
  annotations:
    dns.kian.sh/provider: internal
    external-dns.alpha.kubernetes.io/hostname: openpanel.kian.sh
    external-dns.alpha.kubernetes.io/ingress-hostname-source: annotation-only
spec:
  parentRefs:
    - name: eg-internal
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - openpanel.kian.sh
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: op-api
          port: 3000
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: op-dashboard
          port: 3000
