apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: openpanel
    version: 0.9.0
    releaseName: openpanel
    repo: https://yashgoyal40.github.io/openpanel
    namespace: observability
    valuesFile: values.yaml

resources:
  - base/externalsecret.yaml
  - base/httproute.yaml
  - base/httproute-internal.yaml

# The openpanel chart does not support an existingSecret pattern — it
# renders Secret/openpanel-secrets from plaintext values.yaml inputs.
# We cannot commit real values to git, so we delete the chart's Secret
# here and let our ExternalSecret (base/externalsecret.yaml) create a
# Secret with the same name backed by BWS. Pods consume the right
# values via the same secretKeyRef the chart already wires up.
patches:
  - patch: |-
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata:
        name: openpanel-secrets
        namespace: observability
    target:
      kind: Secret
      name: openpanel-secrets
