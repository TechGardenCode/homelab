apiVersion: apps/v1
kind: Deployment
metadata:
  name: wiki
  namespace: wiki
  labels:
    app.kubernetes.io/name: wiki
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wiki
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wiki
        app.kubernetes.io/component: web
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: wiki
          image: ghcr.io/techgardencode/kian-sh-docs:latest
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: wiki
  namespace: wiki
  labels:
    app.kubernetes.io/name: wiki
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: wiki
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wiki
  namespace: wiki
spec:
  parentRefs:
    - name: eg
      namespace: envoy-gateway-system
  hostnames:
    - wiki.kian.sh
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: wiki
          port: 80
---
apiVersion: v1
kind: Namespace
metadata:
  name: wiki
  labels:
    app.kubernetes.io/name: wiki
