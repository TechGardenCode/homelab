image:
  repository: "ghcr.io/techgardencode/kian-sh-docs"
  tag: "3d978fc73645eeb56303a06eda5f819566816461"

imagePullSecrets:
  - name: ghcr-credentials

ports:
  - name: main
    containerPort: 80

service:
  type: ClusterIP

health:
  enabled: true
  startupProbeSeconds: 60
  port: main
  type: HTTP
  path: /

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 64Mi

httpRoute:
  enabled: true
  hostname: wiki.kian.sh
