image:
  repository: "ghcr.io/techgardencode/kian-sh-docs"
  tag: "a784da8c421733b216aaa13b83e8dcdd85ca860d"

imagePullSecrets:
  - name: ghcr-credentials

ports:
  - name: main
    containerPort: 80

service:
  type: ClusterIP

health:
  enabled: true
  startupProbeSeconds: 60
  port: main
  type: HTTP
  path: /

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 64Mi

httpRoute:
  enabled: true
  hostname: wiki.kian.sh
