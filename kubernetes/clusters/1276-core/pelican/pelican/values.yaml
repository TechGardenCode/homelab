image:
  repository: ghcr.io/pelican-dev/panel
  tag: "latest"

ports:
  - name: main
    containerPort: 80

service:
  type: ClusterIP

health:
  enabled: true
  startupProbeSeconds: 120
  path: /
  type: HTTP

httpRoute:
  enabled: true
  hostname: pelican.techgarden.gg
  gatewayRef:
    name: eg-public
    namespace: envoy-gateway-system

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

database:
  enabled: false

envs:
  pelican:
    DB_HOST: "mariadb"
    DB_PORT: "3306"
    DB_DATABASE: "pelican"
    DB_USERNAME: "pelican"
    CACHE_DRIVER: "redis"
    SESSION_DRIVER: "redis"
    QUEUE_CONNECTION: "redis"
    REDIS_HOST: "redis"
    REDIS_PORT: "6379"
    APP_URL: "https://pelican.techgarden.gg"
    APP_TIMEZONE: "America/Vancouver"
    TRUSTED_PROXIES: "*"
    APP_ENV: "production"
    APP_INSTALLED: "true"

secretEnvs:
  pelican:
    DB_PASSWORD: db-password
    APP_KEY: app-key
    REDIS_PASSWORD: redis-password
