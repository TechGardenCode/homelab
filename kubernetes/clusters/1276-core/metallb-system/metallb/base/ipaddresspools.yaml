apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: system-pool
  namespace: metallb-system
spec:
  addresses:
    # 10.0.61.2-10.0.61.49 expressed as non-overlapping CIDRs
    # (workaround for MetalLB v0.15.3 webhook CIDR decomposition bug)
    - 10.0.61.2/31
    - 10.0.61.4/30
    - 10.0.61.8/29
    - 10.0.61.16/28
    - 10.0.61.32/28
    - 10.0.61.48/31
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: default-pool
  namespace: metallb-system
spec:
  addresses:
    # 10.0.61.50-10.0.61.127 expressed as non-overlapping CIDRs
    - 10.0.61.50/31
    - 10.0.61.52/30
    - 10.0.61.56/29
    - 10.0.61.64/26
