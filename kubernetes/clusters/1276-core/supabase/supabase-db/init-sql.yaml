---
apiVersion: v1
kind: ConfigMap
metadata:
  name: supabase-init-sql
  namespace: supabase
data:
  01-supabase-roles.sql: |
    -- Supabase required roles
    CREATE ROLE anon NOLOGIN NOINHERIT;
    CREATE ROLE authenticated NOLOGIN NOINHERIT;
    CREATE ROLE service_role NOLOGIN NOINHERIT BYPASSRLS;
    CREATE ROLE supabase_auth_admin NOLOGIN NOINHERIT CREATEROLE CREATEDB;
    CREATE ROLE supabase_storage_admin NOLOGIN NOINHERIT CREATEROLE CREATEDB;
    CREATE ROLE supabase_realtime_admin NOLOGIN NOINHERIT CREATEROLE CREATEDB;

    -- Authenticator role (used by PostgREST)
    CREATE ROLE authenticator NOINHERIT LOGIN;
    GRANT anon TO authenticator;
    GRANT authenticated TO authenticator;
    GRANT service_role TO authenticator;
    GRANT supabase_auth_admin TO authenticator;
    GRANT supabase_storage_admin TO authenticator;

    -- Grant schema usage
    ALTER ROLE supabase_admin CREATEDB CREATEROLE;
    GRANT anon TO supabase_admin;
    GRANT authenticated TO supabase_admin;
    GRANT service_role TO supabase_admin;
    GRANT supabase_auth_admin TO supabase_admin;
    GRANT supabase_storage_admin TO supabase_admin;
    GRANT supabase_realtime_admin TO supabase_admin;

    -- Supabase required schemas
    CREATE SCHEMA IF NOT EXISTS auth AUTHORIZATION supabase_auth_admin;
    CREATE SCHEMA IF NOT EXISTS storage AUTHORIZATION supabase_storage_admin;
    CREATE SCHEMA IF NOT EXISTS realtime AUTHORIZATION supabase_realtime_admin;
    CREATE SCHEMA IF NOT EXISTS extensions;

    -- Extensions (available in supabase/postgres image)
    CREATE EXTENSION IF NOT EXISTS pgcrypto WITH SCHEMA extensions;
    CREATE EXTENSION IF NOT EXISTS pgjwt WITH SCHEMA extensions;
    CREATE EXTENSION IF NOT EXISTS uuid-ossp WITH SCHEMA extensions;
    CREATE EXTENSION IF NOT EXISTS pg_stat_statements WITH SCHEMA extensions;
    CREATE EXTENSION IF NOT EXISTS vector WITH SCHEMA extensions;

    -- Grant extensions schema access
    GRANT USAGE ON SCHEMA extensions TO anon, authenticated, service_role;
    GRANT ALL ON SCHEMA extensions TO supabase_admin;
    ALTER DEFAULT PRIVILEGES IN SCHEMA extensions GRANT ALL ON TABLES TO supabase_admin;
    ALTER DEFAULT PRIVILEGES IN SCHEMA extensions GRANT ALL ON FUNCTIONS TO supabase_admin;
    ALTER DEFAULT PRIVILEGES IN SCHEMA extensions GRANT ALL ON SEQUENCES TO supabase_admin;

    -- Grant public schema access
    GRANT USAGE ON SCHEMA public TO anon, authenticated, service_role;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO anon;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO authenticated;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO service_role;
