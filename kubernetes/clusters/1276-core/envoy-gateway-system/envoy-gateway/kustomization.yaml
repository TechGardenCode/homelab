apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - base/gateway-class.yaml
  - base/envoy-proxy.yaml
  - base/pdb.yaml

helmCharts:
  # Install Envoy Gateway controller
  - name: gateway-helm
    version: v1.7.1
    releaseName: gateway-helm
    repo: oci://docker.io/envoyproxy
    includeCRDs: true
    valuesFile: values.yaml
    namespace: envoy-gateway-system
