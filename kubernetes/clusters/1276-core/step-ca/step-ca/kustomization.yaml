apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - base/externalsecrets.yaml
  - base/pdb.yaml

helmCharts:
  - repo: https://smallstep.github.io/helm-charts
    name: step-certificates
    version: 1.30.1
    releaseName: step-ca
    valuesFile: values.yaml
    namespace: step-ca