image:
  repository: "ghcr.io/techgardencode/hausparty"
  tag: "a467a56b57b17efb05427202d25d57b6631a9762"
imagePullSecrets:
  - name: ghcr-credentials
ports:
  - name: main
    containerPort: 3000
service:
  type: ClusterIP
health:
  enabled: true
  startupProbeSeconds: 60
  port: main
  type: HTTP
  # Dedicated probe route — hits a nodejs runtime handler that returns
  # a static 200 with no streaming. Fixes the 18% TransformStream
  # failure rate we saw when probes hit `/` while it was being RSC-
  # streamed to real users.
  path: /api/health
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 512Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
envs:
  - AUTH_KEYCLOAK_ID: "hausparty"
  - AUTH_KEYCLOAK_ISSUER: "https://sso.techgarden.gg/realms/hausparty"
  - AUTH_URL: "https://hausparty.techgarden.gg"
  - AUTH_TRUST_HOST: "true"
  # Route app traffic through the PgBouncer Pooler (transaction mode).
  # Migrations still hit hausparty-db-rw directly — see migrate-job.yaml.
  - PG_HOSTNAME: "hausparty-db-pooler.hausparty.svc.cluster.local"
  - PG_PORT: "5432"
  - PG_DB: "hausparty"
  - PG_USER: "hausparty_app"
  # Redis (Dragonfly) for rate-limit counters. REDIS_PASSWORD is a
  # secretEnv emitted before this env by the generic-service chart, so
  # k8s env-var interpolation expands $(REDIS_PASSWORD) at pod start.
  - REDIS_URL: "redis://default:$(REDIS_PASSWORD)@hausparty-redis.hausparty.svc.cluster.local:6379"
  # Client-side observability (core cluster shared infra). DSN + client
  # ID are per-cluster — prod points at GlitchTip project 3 and the prod
  # OpenPanel project, sourced from BWS via ExternalSecret. API URL is
  # shared across clusters (same self-hosted OpenPanel host).
  - NEXT_PUBLIC_OPENPANEL_API_URL: "https://openpanel.techgarden.gg/api"
secretEnvs:
  - AUTH_KEYCLOAK_SECRET: "keycloak-client-secret"
  - AUTH_SECRET: "auth-secret"
  - PG_PASSWORD: "pg-password"
  - ADMIN_API_KEY: "admin-api-key"
  - EDMTRAIN_API_KEY: "edmtrain-api-key"
  - REDIS_PASSWORD: "redis-password"
  - NEXT_PUBLIC_SENTRY_DSN: "sentry-dsn"
  - NEXT_PUBLIC_OPENPANEL_CLIENT_ID: "openpanel-client-id"
httpRoute:
  enabled: true
  hostname: hausparty.techgarden.gg
gateway:
  public:
    enabled: true
    tunnelTarget: 9221faf4-41f8-4aa6-9cbc-1b757c2a2c07.cfargotunnel.com
