---
# PgBouncer Pooler for hausparty-db (prod).
#
# Sits between the app and the CNPG primary, multiplexing many logical app
# connections through a small fixed pool of real backend connections. The
# app connects via the pooler's auto-generated service
# `hausparty-db-pooler-rw.hausparty.svc.cluster.local` instead of the
# primary -rw service.
#
# Prod sizing: HA with 2 pooler instances, larger pools.
#   max_client_conn (500) × instances (2) = 1000 app-side logical slots
#   default_pool_size (10) × instances (2) = 20 real backend connections
#   Leaves ~80 max_connections headroom for replication, CNPG ops, migrate
#   job, superuser, and future apps.
#
# Pool mode = transaction — max density, but REQUIRES prepare: false in
# the app's postgres.js client (already set in hausparty's db client).
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: hausparty-db-pooler
  namespace: hausparty
spec:
  cluster:
    name: hausparty-db
  instances: 2
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "500"
      default_pool_size: "10"
      min_pool_size: "2"
      reserve_pool_size: "5"
      reserve_pool_timeout: "5"
      server_idle_timeout: "120"
      server_lifetime: "3600"
      query_wait_timeout: "120"
      log_connections: "0"
      log_disconnections: "0"
  template:
    spec:
      containers:
        - name: pgbouncer
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
      affinity:
        # Spread pooler instances across nodes so a single node loss
        # doesn't take out both replicas.
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    cnpg.io/poolerName: hausparty-db-pooler
                topologyKey: kubernetes.io/hostname
  monitoring:
    enablePodMonitor: true
