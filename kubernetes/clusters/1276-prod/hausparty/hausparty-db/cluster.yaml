---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: hausparty-db
  namespace: hausparty
spec:
  instances: 2

  enableSuperuserAccess: true
  superuserSecret:
    name: hausparty-db-superuser

  postgresql:
    pg_hba:
      - host all postgres all scram-sha-256
      - host all all all scram-sha-256
    # Explicit tuning — don't rely on CNPG/postgres defaults.
    # max_connections sizing: app(POOL_MAX=5 × replicas=1) + pooler(default_pool_size=10 × 2)
    #                         + migrate(1) + CNPG ops(~5) + superuser(3) + replication(4)
    #                         + headroom for future apps = ~40 used. 100 → 2.5x headroom.
    # Memory: shared_buffers = 25% of memory limit (1Gi), effective_cache_size ~75%.
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"
      effective_cache_size: "768MB"
      work_mem: "8MB"
      maintenance_work_mem: "128MB"
      random_page_cost: "1.1" # SSD
      log_min_duration_statement: "1000" # log queries slower than 1s
      # WAL & checkpoint tuning for write-heavy workloads (submissions, migrations)
      max_wal_size: "2GB"
      min_wal_size: "512MB"
      checkpoint_completion_target: "0.9"

  storage:
    size: 10Gi
    storageClass: freenas-iscsi-ssd-csi

  bootstrap:
    initdb:
      database: hausparty
      owner: hausparty_app
      secret:
        name: hausparty-db-app-credentials
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS pg_trgm
        - CREATE EXTENSION IF NOT EXISTS unaccent

  monitoring:
    enablePodMonitor: true
    disableDefaultQueries: false

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
