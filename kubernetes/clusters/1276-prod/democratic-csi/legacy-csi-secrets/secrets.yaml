# Legacy CSI secrets for PersistentVolumes created before the
# democratic-csi → storage namespace migration.
#
# PVs have immutable nodeStageSecretRef/nodePublishSecretRef fields
# pointing to the old democratic-csi namespace. These empty secrets
# satisfy CSI spec validation so those PVs can still mount.
#
# Safe to remove once no PVs reference democratic-csi namespace:
#   kubectl get pv -o json | jq '[.items[] | select(.spec.csi.nodeStageSecretRef.namespace == "democratic-csi")] | length'
---
# Release: democratic-csi-nfs (StorageClass: freenas-nfs-csi)
apiVersion: v1
kind: Secret
metadata:
  name: controller-expand-secret-freenas-nfs-csi-democratic-csi-nfs
type: Opaque
---
apiVersion: v1
kind: Secret
metadata:
  name: controller-publish-secret-freenas-nfs-csi-democratic-csi-nfs
type: Opaque
---
apiVersion: v1
kind: Secret
metadata:
  name: node-publish-secret-freenas-nfs-csi-democratic-csi-nfs
type: Opaque
---
apiVersion: v1
kind: Secret
metadata:
  name: node-stage-secret-freenas-nfs-csi-democratic-csi-nfs
type: Opaque
---
apiVersion: v1
kind: Secret
metadata:
  name: provisioner-secret-freenas-nfs-csi-democratic-csi-nfs
type: Opaque
---
