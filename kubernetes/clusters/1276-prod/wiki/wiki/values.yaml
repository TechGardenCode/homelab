image:
  repository: "ghcr.io/techgardencode/kian-sh-docs"
  tag: "ebe64b25573596fb64c8a98ea3793e8bc6df1378"
imagePullSecrets:
  - name: ghcr-credentials
ports:
  - name: main
    containerPort: 80
