image:
  repository: ghcr.io/pelican-dev/panel
  tag: "v1.0.0-beta35"          # PIN — external image, not bot-managed; bump via Renovate. Never :latest.

ports:
  - name: main
    containerPort: 80

service:
  type: ClusterIP

health:
  enabled: true
  startupProbeSeconds: 120
  path: /up
  type: HTTP

httpRoute:
  enabled: true
  hostname: pelican.techgarden.gg
gateway:
  public:
    enabled: true
    tunnelTarget: 9221faf4-41f8-4aa6-9cbc-1b757c2a2c07.cfargotunnel.com

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

database:
  enabled: false

envs:
  pelican:
    DB_CONNECTION: "pgsql"
    DB_HOST: "pelican-db-rw"
    DB_PORT: "5432"
    DB_DATABASE: "panel"
    DB_USERNAME: "pelican"
    CACHE_DRIVER: "redis"
    SESSION_DRIVER: "redis"
    QUEUE_CONNECTION: "redis"
    REDIS_HOST: "pelican-redis"
    REDIS_PORT: "6379"
    APP_URL: "https://pelican.techgarden.gg"
    APP_TIMEZONE: "America/New_York"
    TRUSTED_PROXIES: "10.0.0.0/8"
    BEHIND_PROXY: "true"
    APP_ENV: "production"
    APP_INSTALLED: "true"         # keep true — migrate via CLI (Task 1.6); false exposes the public web installer

secretEnvs:
  pelican:
    DB_PASSWORD: db-password
    APP_KEY: app-key
    REDIS_PASSWORD: redis-password
