apiVersion: v1
kind: Service
metadata:
  name: pelican-internal
  namespace: pelican
  annotations:
    # internal external-dns (RFC2136 -> Technitium) only processes resources
    # carrying this provider annotation (--annotation-filter). Without it the
    # A record for pelican.internal.kian.sh is never published.
    dns.kian.sh/provider: internal
    external-dns.alpha.kubernetes.io/hostname: pelican.internal.kian.sh
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: pelican
  ports:
    - name: http
      port: 80
      targetPort: 80
