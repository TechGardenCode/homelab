      remoteRef:
        key: "d66f0284-6e67-4d07-9733-b485015f893c"  # pelican-prod-db-password — SAME entry as CNPG app user (no drift)
    - secretKey: app-key
      remoteRef:
        key: "153b942b-de41-4c94-9d48-b41b00161ed2"
    - secretKey: redis-password
      remoteRef:
        key: "1d7a1dc8-b9b3-4265-bdee-b41b0016204f"
