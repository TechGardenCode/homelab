apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: garage
  namespace: garage
spec:
  serviceName: garage
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: garage }
  template:
    metadata:
      labels: { app.kubernetes.io/name: garage }
    spec:
      containers:
        - name: garage
          image: dxflrs/garage:v1.0.1     # external image; pin manually / via Renovate (not bot-managed)
          command: ["/garage", "server"]
          env:
            - name: GARAGE_RPC_SECRET
              valueFrom: { secretKeyRef: { name: garage-secrets, key: rpc-secret } }
            - name: GARAGE_ADMIN_TOKEN
              valueFrom: { secretKeyRef: { name: garage-secrets, key: admin-token } }
          ports:
            - { name: s3-api, containerPort: 3900 }
            - { name: rpc,    containerPort: 3901 }
            - { name: admin,  containerPort: 3903 }
          volumeMounts:
            - { name: meta, mountPath: /var/lib/garage/meta }
            - { name: data, mountPath: /var/lib/garage/data }
            - { name: config, mountPath: /etc/garage.toml, subPath: garage.toml }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { memory: 1Gi }
      volumes:
        - name: config
          configMap: { name: garage-config }
  volumeClaimTemplates:
    - metadata: { name: meta }
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: freenas-iscsi-ssd-csi   # LMDB index: random sync-heavy IO, keep on SSD
        resources: { requests: { storage: 2Gi } }
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: freenas-iscsi-csi        # cold backup blobs: sequential, HDD is right
        resources: { requests: { storage: 20Gi } }   # ponytail: bump when backups grow
