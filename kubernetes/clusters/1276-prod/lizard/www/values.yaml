image:
  repository: "ghcr.io/techgardencode/lizard"
  tag: "7699fd6484ba71250e6da71376d9bdea0f7a3cd4"
ports:
  - name: main
    containerPort: 80
service:
  type: ClusterIP
# Exposure: Public via netcup VPS edge proxy (no cloudflared tunnel).
# DNS lizard.techgarden.gg is a manual A record to the VPS IP; the
# tunnelTarget annotation is omitted so external-dns doesn't try to
# overwrite that record with a cfargotunnel CNAME.
httpRoute:
  enabled: true
  hostname: lizard.techgarden.gg
gateway:
  public:
    enabled: true
