image:
  repository: "ghcr.io/techgardencode/kian.coffee"
  tag: "094376124bd2b58390254dd83a7781cbcb289fd1"
ports:
  - name: main
    containerPort: 4000
service:
  type: ClusterIP
# SSR runtime exposes a dedicated /health endpoint for probes — the
# generic-service chart defaults to `/`, which returns a full SSR render.
health:
  path: /health
# Exposure: Tier 3 (Cloudflare Tunnel) + Internal
httpRoute:
  enabled: true
  hostname: kian.coffee
gateway:
  internal:
    enabled: true
  public:
    enabled: true
    tunnelTarget: 9221faf4-41f8-4aa6-9cbc-1b757c2a2c07.cfargotunnel.com
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 512Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
# Paired with readOnlyRootFilesystem above — gives Node/Angular a writable
# scratch space without exposing the rest of the image to runtime writes.
emptyDirs:
  - name: tmp
    containerPath: /tmp
