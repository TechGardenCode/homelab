image:
  repository: "ghcr.io/techgardencode/kian.coffee"
  tag: "c203baf925f793399a25b8a2bebaf6f1a98b7c0a"
ports:
  - name: main
    containerPort: 4000
service:
  type: ClusterIP
# SSR runtime exposes a dedicated /health endpoint for probes — the
# generic-service chart defaults to `/`, which returns a full SSR render.
health:
  path: /health
# Exposure: Tier 3 (Cloudflare Tunnel) + Internal
httpRoute:
  enabled: true
  hostname: kian.coffee
gateway:
  internal:
    enabled: true
  public:
    enabled: true
    tunnelTarget: 9221faf4-41f8-4aa6-9cbc-1b757c2a2c07.cfargotunnel.com
