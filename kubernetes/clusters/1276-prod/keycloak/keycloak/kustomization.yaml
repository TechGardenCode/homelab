apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: keycloakx
    version: 7.1.11
    releaseName: keycloak
    repo: https://codecentric.github.io/helm-charts
    namespace: keycloak
    valuesFile: values.yaml

resources:
  - base/externalsecret.yaml
  - base/externalsecret-realm.yaml
  - base/realm-configmap.yaml
  - base/httproute.yaml
  - base/httproute-internal.yaml
