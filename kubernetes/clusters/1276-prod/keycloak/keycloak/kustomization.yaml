apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: keycloak

resources:
  # Official Keycloak Operator @ 26.6.3 (CRDs + operator Deployment/RBAC),
  # vendored from keycloak/keycloak-k8s-resources. CRDs apply under the
  # ApplicationSet's ServerSideApply=true (the Keycloak CRD exceeds the
  # client-side annotation limit).
  - base/operator/crd-keycloaks.yaml
  - base/operator/crd-keycloakrealmimports.yaml
  - base/operator/operator.yaml
  - base/keycloak-cr.yaml
  - base/externalsecret.yaml
  - base/externalsecret-realm.yaml
  - base/httproute.yaml
  - base/httproute-internal.yaml
  - base/config-cli-job.yaml

configMapGenerator:
  - name: keycloak-realm-config
    namespace: keycloak
    files:
      - base/realms/accounts-realm.json
      - base/realms/hausparty-realm.json
      - base/realms/kian-coffee-realm.json

generatorOptions:
  disableNameSuffixHash: true
