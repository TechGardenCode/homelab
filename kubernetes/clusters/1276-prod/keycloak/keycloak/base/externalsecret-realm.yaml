---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-realm-secrets
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: keycloak-realm-secrets
  data:
    - secretKey: hausparty-client-secret
      remoteRef:
        key: "7efc9f22-9adb-4d03-86cb-b4240013d5d9"
    # accounts realm — broker client secrets (per-env)
    - secretKey: broker-hausparty-secret
      remoteRef:
        key: "e1d24a90-3615-4001-b203-b4420013a372"
    - secretKey: broker-kian-coffee-secret
      remoteRef:
        key: "0f6048e9-a211-4d20-9909-b4420013a42b"
    - secretKey: broker-master-secret
      remoteRef:
        key: "d8656e40-065d-4659-b20f-b4420013a491"
