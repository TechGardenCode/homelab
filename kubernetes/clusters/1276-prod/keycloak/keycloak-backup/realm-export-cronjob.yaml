---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: keycloak-realm-export
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak-realm-export
spec:
  schedule: "30 3 * * *"
  timeZone: Europe/Berlin
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      completions: 1
      parallelism: 1
      template:
        spec:
          restartPolicy: Never
          terminationGracePeriodSeconds: 30
          containers:
            - name: realm-export
              image: curlimages/curl:8.12.1
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  KC_URL="http://keycloak-http.keycloak.svc:80"
                  mkdir -p /backups/realm-exports

                  echo "[$(date)] Authenticating with Keycloak..."
                  TOKEN=$(curl -sf -X POST \
                    "${KC_URL}/realms/master/protocol/openid-connect/token" \
                    -d "client_id=admin-cli" \
                    -d "username=${KC_ADMIN_USERNAME}" \
                    -d "password=${KC_ADMIN_PASSWORD}" \
                    -d "grant_type=password" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')

                  if [ -z "$TOKEN" ]; then
                    echo "[$(date)] ERROR: Failed to authenticate"
                    exit 1
                  fi

                  echo "[$(date)] Exporting realms..."
                  for REALM in $(curl -sf -H "Authorization: Bearer ${TOKEN}" \
                    "${KC_URL}/admin/realms" | sed 's/.*"realm":"\([^"]*\)".*/\1/g' | tr ',' '\n'); do
                    echo "[$(date)] Exporting realm: ${REALM}"
                    curl -sf -H "Authorization: Bearer ${TOKEN}" \
                      "${KC_URL}/admin/realms/${REALM}/partial-export?exportClients=true&exportGroupsAndRoles=true" \
                      -o "/backups/realm-exports/${REALM}-${TIMESTAMP}.json"
                  done

                  echo "[$(date)] Cleaning up exports older than 30 days..."
                  find /backups/realm-exports -name "*.json" -mtime +30 -delete
                  echo "[$(date)] Done."
              env:
                - name: KC_ADMIN_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-admin
                      key: username
                - name: KC_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-admin
                      key: password
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: keycloak-backups
