apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: system-pool
  namespace: metallb-system
spec:
  addresses:
    # 10.0.61.128-10.0.61.139 expressed as non-overlapping CIDRs
    # (workaround for MetalLB v0.15.3 webhook CIDR decomposition bug)
    - 10.0.61.128/29
    - 10.0.61.136/30
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: default-pool
  namespace: metallb-system
spec:
  addresses:
    # 10.0.61.140-10.0.61.254 expressed as non-overlapping CIDRs
    - 10.0.61.140/30
    - 10.0.61.144/28
    - 10.0.61.160/27
    - 10.0.61.192/27
    - 10.0.61.224/28
    - 10.0.61.240/29
    - 10.0.61.248/30
    - 10.0.61.252/31
    - 10.0.61.254/32
