apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - base/externalsecret.yaml

helmCharts:
  - repo: https://kubernetes-sigs.github.io/external-dns
    name: external-dns
    version: 1.21.1
    releaseName: external-dns-cloudflare
    namespace: platform
    includeCRDs: true
    valuesFile: values.yaml
