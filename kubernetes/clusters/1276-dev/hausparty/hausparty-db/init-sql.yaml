---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hausparty-db-init-sql
  namespace: hausparty
data:
  01-extensions.sql: |
    -- Extensions required by hausparty (must be created by superuser)
    -- Schema, tables, and seed data are managed by Drizzle migrations in the app.
    CREATE EXTENSION IF NOT EXISTS pg_trgm;
    CREATE EXTENSION IF NOT EXISTS unaccent;
