apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: hausparty-redis
  namespace: hausparty
  labels:
    app.kubernetes.io/name: hausparty-redis
    app.kubernetes.io/part-of: hausparty
spec:
  image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.38.0
  replicas: 1
  # Pin to 1 IO thread: Dragonfly auto-scales threads to host CPU count and
  # requires ~256Mi per thread. On the 4-core dev node that defaults to
  # 1Gi minimum — overrunning our 512Mi limit. Rate-limit counters don't
  # need concurrency.
  args:
    - "--proactor_threads=1"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
  # Dev: no authentication. Prod will add authentication.passwordFromSecret
  # + ExternalSecret on promotion.
  #
  # NetworkPolicy disabled so Alloy (in monitoring namespace) can scrape
  # the admin port (9999) for Prometheus metrics — the operator's default
  # policy only allows controller-manager + peer Dragonfly pods. For prod
  # we'll either label Alloy or use a separate metrics exporter.
  networkPolicyEnabled: false
