image:
  repository: "ghcr.io/techgardencode/hausparty"
  tag: "0da800b070e969516b1581b81a5a76755bf63ebf"
imagePullSecrets:
  - name: ghcr-credentials
ports:
  - name: main
    containerPort: 3000
service:
  type: ClusterIP
health:
  enabled: true
  startupProbeSeconds: 60
  port: main
  type: HTTP
  path: /api/health
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
envs:
  - AUTH_KEYCLOAK_ID: "hausparty"
  - AUTH_KEYCLOAK_ISSUER: "https://sso.dev.techgarden.gg/realms/hausparty"
  - AUTH_URL: "https://hausparty.dev.techgarden.gg"
  - AUTH_TRUST_HOST: "true"
  # Route app traffic through the PgBouncer Pooler (transaction mode).
  # Migrations still hit hausparty-db-rw directly — see migrate-job.yaml.
  - PG_HOSTNAME: "hausparty-db-pooler.hausparty.svc.cluster.local"
  - PG_PORT: "5432"
  - PG_DB: "hausparty"
  - PG_USER: "hausparty_app"
  # Redis (Dragonfly) for rate-limit counters. Dev instance has no auth —
  # access restricted by the operator's default NetworkPolicy. Prod wires
  # in a password via secretEnvs.
  - REDIS_URL: "redis://hausparty-redis.hausparty.svc.cluster.local:6379"
  # Client-side observability (core cluster shared infra). DSN + client
  # ID are per-cluster — dev points at GlitchTip project 1 and the dev
  # OpenPanel project, sourced from BWS via ExternalSecret. API URL is
  # shared across clusters (same self-hosted OpenPanel host).
  - NEXT_PUBLIC_OPENPANEL_API_URL: "https://openpanel.techgarden.gg/api"
secretEnvs:
  - AUTH_KEYCLOAK_SECRET: "keycloak-client-secret"
  - AUTH_SECRET: "auth-secret"
  - PG_PASSWORD: "pg-password"
  - ADMIN_API_KEY: "admin-api-key"
  - EDMTRAIN_API_KEY: "edmtrain-api-key"
  - NEXT_PUBLIC_SENTRY_DSN: "sentry-dsn"
  - NEXT_PUBLIC_OPENPANEL_CLIENT_ID: "openpanel-client-id"
httpRoute:
  enabled: true
  hostname: hausparty.dev.techgarden.gg
