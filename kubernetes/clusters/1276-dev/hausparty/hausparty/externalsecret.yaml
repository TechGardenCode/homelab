---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hausparty
  namespace: hausparty
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: hausparty
  data:
    - secretKey: keycloak-client-secret
      remoteRef:
        key: "dfc135ab-56bd-42e6-83a8-b4230112ea1e"
    - secretKey: auth-secret
      remoteRef:
        key: "09512667-d3ec-46d7-8c42-b4230112ea3f"
    - secretKey: pg-password
      remoteRef:
        key: "c75e6775-a630-4213-9086-b4230112e9f8"
    - secretKey: admin-api-key
      remoteRef:
        key: "c5f03b67-e4d8-4888-99aa-b416000ff1b7"
    - secretKey: edmtrain-api-key
      remoteRef:
        key: "f336e797-bc78-4f2b-959e-b416000ff293"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-credentials
  namespace: hausparty
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: ghcr-credentials
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ .dockerconfigjson }}"
  data:
    - secretKey: dockerconfigjson
      remoteRef:
        key: "4f972fe7-8e8c-48d7-8bea-b41300df1574"
