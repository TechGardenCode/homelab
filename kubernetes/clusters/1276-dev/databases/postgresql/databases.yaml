---
# Consolidated `techgarden` database on the shared `postgresql` cluster
# (ADR-0030/0031, schema-per-module). The four former per-service databases
# (iris/dopamenu/plates/notifications) were the PR1 rollback and were retired in
# PR2's Phase 4 once the monolith went live — `techgarden` is the single backend
# DB now.
# databaseReclaimPolicy: retain => deleting the CR never drops the live database.
# Adopts the existing `techgarden` DB created by the cluster bootstrap (initdb),
# reassigning its owner from the bootstrap `techgardencode` to the managed
# `techgarden_app` role.
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: techgarden-database
  namespace: databases
spec:
  name: techgarden
  owner: techgarden_app
  cluster:
    name: postgresql
  databaseReclaimPolicy: retain
