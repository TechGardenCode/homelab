---
# Consolidated app-role password (ADR-0030/0031) for `techgarden_app`, materialised
# into the `databases` namespace so `managed.roles.passwordSecret` (cluster.yaml) can
# set it. type basic-auth + keys username/password + cnpg.io/reload label are required
# by cnpg managed roles. The SAME Bitwarden entry feeds the product-namespace app secret
# in the techgarden repo (password parity).
#
# Reuses the former iris_app entry (promoted to techgarden_app under the consolidation —
# nothing connects as iris_app after the cutover). CAUTION: do NOT delete this Bitwarden
# entry (6389718c…); it backs techgarden_app and the live `api` deployment. The four
# per-service ExternalSecrets that used to live here (iris/dopamenu/plates/notifications)
# were removed in PR2 Phase 4; only dopamenu/plates/notifications had their OWN Bitwarden
# entries (14eb7f8b / e333d7be / 7015df9c), which were deleted then — iris's was 6389718c,
# kept here.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: techgarden-db-app-credentials
  namespace: databases
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: techgarden-db-app-credentials
    template:
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: techgarden_app
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: "6389718c-e6b6-4912-b4e1-b47e00553637"
