---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgresql
  namespace: databases
spec:
  instances: 1

  # NOTE (ADR-0018): no `imageName` is pinned here — this shared cluster runs the
  # cnpg operator default operand image. iris needs pgvector (migration V6
  # `CREATE EXTENSION vector`), which is NOT a core extension. Before the iris
  # cutover, verify the operand image bundles pgvector and, if absent, pin
  # `imageName` to a pgvector-bearing tag MATCHING the current PG major (a major
  # downgrade is impossible). Changing the image rolls this live instance (it also
  # hosts the `techgarden` DB), so treat it as a deliberate maintenance step.
  # See techgarden docs/processes/shared-db-consolidation-runbook.md §2.
  enableSuperuserAccess: true
  superuserSecret:
    name: postgresql-superuser

  postgresql:
    pg_hba:
      - host all postgres all scram-sha-256
      - host all all all scram-sha-256

  storage:
    size: 10Gi
    storageClass: freenas-iscsi-ssd-csi

  bootstrap:
    initdb:
      database: techgarden
      owner: techgardencode
      secret:
        name: postgresql-app-credentials
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: postgresql-init-sql
            key: 01-create-roles.sql
      postInitSQLRefs:
        configMapRefs:
          - name: postgresql-init-sql
            key: 02-create-databases.sql

  monitoring:
    enablePodMonitor: true
    disableDefaultQueries: false

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  # iris + dopamenu + plates + notifications app roles (ADR-0018 consolidation). LOGIN NOSUPERUSER
  # NOBYPASSRLS is the RLS invariant — the services connect as these roles; the
  # Flyway migrator connects as the cluster superuser `postgres`. Passwords come
  # from ESO-materialised secrets (app-externalsecrets.yaml) in this namespace.
  managed:
    roles:
      - name: iris_app
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        bypassrls: false
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: iris-db-app-credentials
      - name: dopamenu_app
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        bypassrls: false
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: dopamenu-db-app-credentials
      - name: plates_app
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        bypassrls: false
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: plates-db-app-credentials
      - name: notifications_app
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        bypassrls: false
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: notifications-db-app-credentials
      # Consolidated app role (ADR-0031). The five services connect as this one
      # role against the `techgarden` DB (schema per module); the per-service
      # roles above stay until PR2 so their DBs remain the rollback.
      - name: techgarden_app
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        bypassrls: false
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: techgarden-db-app-credentials
