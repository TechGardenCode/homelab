---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgresql
  namespace: databases
spec:
  instances: 1

  enableSuperuserAccess: true
  superuserSecret:
    name: postgresql-superuser

  postgresql:
    pg_hba:
      - host all postgres all scram-sha-256
      - host all all all scram-sha-256

  storage:
    size: 10Gi
    storageClass: freenas-iscsi-ssd-csi

  bootstrap:
    initdb:
      database: techgarden
      owner: techgardencode
      secret:
        name: postgresql-app-credentials
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: postgresql-init-sql
            key: 01-create-roles.sql
      postInitSQLRefs:
        configMapRefs:
          - name: postgresql-init-sql
            key: 02-create-databases.sql

  monitoring:
    enablePodMonitor: true
    disableDefaultQueries: false

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  # iris + dopamenu app roles (ADR-0018 consolidation). LOGIN NOSUPERUSER
  # NOBYPASSRLS is the RLS invariant — the services connect as these roles; the
  # Flyway migrator connects as the cluster superuser `postgres`. Passwords come
  # from ESO-materialised secrets (app-externalsecrets.yaml) in this namespace.
  managed:
    roles:
      - name: iris_app
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        bypassrls: false
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: iris-db-app-credentials
      - name: dopamenu_app
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        bypassrls: false
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: dopamenu-db-app-credentials
