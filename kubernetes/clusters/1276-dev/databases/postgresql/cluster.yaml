---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgresql
  namespace: databases
spec:
  instances: 1

  # NOTE (ADR-0018): no `imageName` is pinned here — this shared cluster runs the
  # cnpg operator default operand image. iris needs pgvector (migration V6
  # `CREATE EXTENSION vector`), which is NOT a core extension. Before the iris
  # cutover, verify the operand image bundles pgvector and, if absent, pin
  # `imageName` to a pgvector-bearing tag MATCHING the current PG major (a major
  # downgrade is impossible). Changing the image rolls this live instance (it also
  # hosts the `techgarden` DB), so treat it as a deliberate maintenance step.
  # See techgarden docs/processes/shared-db-consolidation-runbook.md §2.
  enableSuperuserAccess: true
  superuserSecret:
    name: postgresql-superuser

  postgresql:
    pg_hba:
      - host all postgres all scram-sha-256
      - host all all all scram-sha-256

  storage:
    size: 10Gi
    storageClass: freenas-iscsi-ssd-csi

  bootstrap:
    initdb:
      database: techgarden
      owner: techgardencode
      secret:
        name: postgresql-app-credentials
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: postgresql-init-sql
            key: 01-create-roles.sql
      postInitSQLRefs:
        configMapRefs:
          - name: postgresql-init-sql
            key: 02-create-databases.sql

  monitoring:
    enablePodMonitor: true
    disableDefaultQueries: false

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  # The consolidated `techgarden_app` role (ADR-0030/0031). The five modules
  # connect as this one role against the `techgarden` DB (schema per module); the
  # Flyway migrator connects as the cluster superuser `postgres`. LOGIN NOSUPERUSER
  # NOBYPASSRLS is the RLS invariant. Password comes from an ESO-materialised
  # secret (app-externalsecrets.yaml) in this namespace.
  #
  # The four former per-service roles (iris_app/dopamenu_app/plates_app/
  # notifications_app) were unmanaged here in PR2 Phase 4 once the monolith went
  # live, then dropped manually (cnpg does not drop a role it stops managing; and
  # DROP ROLE only succeeds after each role's own DB is dropped).
  managed:
    roles:
      - name: techgarden_app
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        bypassrls: false
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: techgarden-db-app-credentials
