---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgresql-backup
  namespace: databases
  labels:
    app.kubernetes.io/name: postgresql-backup
spec:
  schedule: "0 3 * * *"
  timeZone: Europe/Berlin
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      completions: 1
      parallelism: 1
      template:
        spec:
          restartPolicy: OnFailure
          terminationGracePeriodSeconds: 30
          containers:
            - name: pg-backup
              image: postgres:18
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  HOST="postgresql-rw.databases.svc"
                  mkdir -p /backups/postgresql
                  echo "[$(date)] Starting per-database PostgreSQL backup..."
                  DATABASES=$(psql -h "$HOST" -U postgres -t -A -c \
                    "SELECT datname FROM pg_database WHERE datistemplate = false AND datname != 'postgres';")
                  for DB in $DATABASES; do
                    echo "[$(date)] Backing up database: $DB"
                    pg_dump -h "$HOST" -U postgres -Fc "$DB" \
                      > /backups/postgresql/${DB}-${TIMESTAMP}.dump
                    echo "[$(date)] Done: ${DB}-${TIMESTAMP}.dump"
                  done
                  echo "[$(date)] Cleaning up backups older than 3 days..."
                  find /backups/postgresql -name "*.dump" -mtime +3 -delete
                  echo "[$(date)] Done."
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-superuser
                      key: password
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: db-backups
