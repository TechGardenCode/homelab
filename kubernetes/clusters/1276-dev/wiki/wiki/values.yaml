image:
  repository: "ghcr.io/techgardencode/kian-sh-docs"
  tag: "bcae04719a9bfccd78d043810ef2c215fb7eece7"
imagePullSecrets:
  - name: ghcr-credentials
ports:
  - name: main
    containerPort: 80
service:
  type: ClusterIP
health:
  enabled: true
  startupProbeSeconds: 60
  port: main
  type: HTTP
  path: /
