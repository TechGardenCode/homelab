---
# Official Keycloak Operator CR — replaces the codecentric/keycloakx chart.
# Points at the existing external CNPG keycloak-db (separate ArgoCD app, survives
# this app). Server image is the operator's pinned default (26.6.3 via
# RELATED_IMAGE_KEYCLOAK) — no spec.image, so the operator does its own augmented
# build/start (no startOptimized footgun). sync-wave 5: applied after the CRD +
# operator (wave 0) are Established/Healthy.
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  instances: 1
  db:
    vendor: postgres
    host: keycloak-db-rw.keycloak.svc
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db-app-credentials
      key: username
    passwordSecret:
      name: keycloak-db-app-credentials
      key: password
  hostname:
    hostname: https://sso.dev.techgarden.gg
  http:
    httpEnabled: true            # TLS terminates upstream (cloudflared / eg-internal)
  proxy:
    headers: xforwarded
  ingress:
    enabled: false               # north-south is Gateway API HTTPRoute, not operator Ingress
  bootstrapAdmin:
    user:
      secret: keycloak-admin     # existing ES (username+password keys); admin already in DB
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
