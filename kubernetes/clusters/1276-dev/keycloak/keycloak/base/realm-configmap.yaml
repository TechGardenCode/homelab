---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-config
  namespace: keycloak
data:
  accounts-realm.json: |
    {
      "realm": "accounts",
      "enabled": true,
      "displayName": "Accounts",
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "verifyEmail": false,
      "passwordPolicy": "length(14) and notUsername and passwordHistory(5)",
      "otpPolicyType": "totp",
      "otpPolicyAlgorithm": "HmacSHA256",
      "otpPolicyDigits": 6,
      "otpPolicyPeriod": 30,
      "bruteForceProtected": true,
      "permanentLockout": false,
      "failureFactor": 5,
      "sslRequired": "external",
      "roles": {
        "realm": [
          { "name": "infra-admin", "description": "Cross-realm infrastructure admin" },
          { "name": "app-admin",   "description": "Cross-realm application admin" }
        ]
      },
      "clients": [
        {
          "clientId": "broker-techgarden",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "${KC_BROKER_TECHGARDEN_SECRET}",
          "protocol": "openid-connect",
          "publicClient": false,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false,
          "redirectUris": ["https://sso.dev.techgarden.gg/realms/techgarden/broker/accounts/endpoint"],
          "webOrigins": [],
          "defaultClientScopes": ["openid", "basic", "profile", "email"]
        },
        {
          "clientId": "broker-hausparty",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "${KC_BROKER_HAUSPARTY_SECRET}",
          "protocol": "openid-connect",
          "publicClient": false,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false,
          "redirectUris": ["https://sso.dev.techgarden.gg/realms/hausparty/broker/accounts/endpoint"],
          "webOrigins": [],
          "defaultClientScopes": ["openid", "basic", "profile", "email"]
        },
        {
          "clientId": "broker-kian-coffee",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "${KC_BROKER_KIAN_COFFEE_SECRET}",
          "protocol": "openid-connect",
          "publicClient": false,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false,
          "redirectUris": ["https://sso.dev.techgarden.gg/realms/kian-coffee/broker/accounts/endpoint"],
          "webOrigins": [],
          "defaultClientScopes": ["openid", "basic", "profile", "email"]
        },
        {
          "clientId": "broker-master",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "${KC_BROKER_MASTER_SECRET}",
          "protocol": "openid-connect",
          "publicClient": false,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false,
          "redirectUris": ["https://sso.dev.techgarden.gg/realms/master/broker/accounts/endpoint"],
          "webOrigins": [],
          "defaultClientScopes": ["openid", "basic", "profile", "email"]
        }
      ],
      "users": [
        {
          "username": "kian",
          "email": "kian@kian.sh",
          "firstName": "Kian",
          "lastName": "Alikhani",
          "enabled": true,
          "emailVerified": true,
          "credentials": [{ "type": "password", "value": "${KC_USER_KIAN_PASSWORD}", "temporary": false }],
          "requiredActions": ["CONFIGURE_TOTP"],
          "realmRoles": ["default-roles-accounts", "infra-admin", "app-admin"]
        },
        {
          "username": "techgardencode",
          "email": "techgardencode@techgarden.gg",
          "firstName": "TechGarden",
          "lastName": "Code",
          "enabled": true,
          "emailVerified": true,
          "credentials": [{ "type": "password", "value": "${KC_USER_TECHGARDENCODE_PASSWORD}", "temporary": false }],
          "requiredActions": ["CONFIGURE_TOTP"],
          "realmRoles": ["default-roles-accounts", "app-admin"]
        }
      ]
    }
  techgarden-realm.json: |
    {
      "realm": "techgarden",
      "enabled": true,
      "registrationAllowed": false,
      "clientScopes": [
        {
          "name": "api.blog",
          "protocol": "openid-connect",
          "protocolMappers": [
            {
              "name": "api.blog-audience",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "config": {
                "included.custom.audience": "api.blog",
                "access.token.claim": "true",
                "id.token.claim": "false"
              }
            }
          ]
        },
        {
          "name": "api.profile",
          "protocol": "openid-connect",
          "protocolMappers": [
            {
              "name": "api.profile-audience",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "config": {
                "included.custom.audience": "api.profile",
                "access.token.claim": "true",
                "id.token.claim": "false"
              }
            }
          ]
        }
      ],
      "roles": {
        "realm": [
          { "name": "app_admin", "description": "Application administrator" }
        ]
      },
      "clients": [
        {
          "clientId": "bff",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "${KC_CLIENT_BFF_SECRET}",
          "protocol": "openid-connect",
          "publicClient": false,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false,
          "redirectUris": ["*"],
          "webOrigins": ["*"],
          "defaultClientScopes": ["openid", "basic", "profile", "email", "offline_access", "api.blog", "api.profile"]
        },
        {
          "clientId": "svc.profile",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "${KC_CLIENT_PROFILE_SECRET}",
          "protocol": "openid-connect",
          "publicClient": false,
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": true,
          "defaultClientScopes": ["openid", "basic", "api.blog", "api.profile"]
        }
      ],
      "identityProviders": [
        {
          "alias": "accounts",
          "displayName": "Sign in with Accounts",
          "providerId": "oidc",
          "enabled": true,
          "trustEmail": true,
          "storeToken": false,
          "addReadTokenRoleOnCreate": false,
          "firstBrokerLoginFlowAlias": "first broker login",
          "config": {
            "issuer": "https://sso.dev.techgarden.gg/realms/accounts",
            "authorizationUrl": "https://sso.dev.techgarden.gg/realms/accounts/protocol/openid-connect/auth",
            "tokenUrl": "https://sso.dev.techgarden.gg/realms/accounts/protocol/openid-connect/token",
            "userInfoUrl": "https://sso.dev.techgarden.gg/realms/accounts/protocol/openid-connect/userinfo",
            "logoutUrl": "https://sso.dev.techgarden.gg/realms/accounts/protocol/openid-connect/logout",
            "jwksUrl": "https://sso.dev.techgarden.gg/realms/accounts/protocol/openid-connect/certs",
            "useJwksUrl": "true",
            "validateSignature": "true",
            "clientId": "broker-techgarden",
            "clientSecret": "${KC_BROKER_TECHGARDEN_SECRET}",
            "syncMode": "FORCE",
            "defaultScope": "openid profile email"
          }
        }
      ],
      "identityProviderMappers": [
        {
          "name": "hardcoded-app_admin",
          "identityProviderAlias": "accounts",
          "identityProviderMapper": "oidc-hardcoded-role-idp-mapper",
          "config": { "role": "app_admin", "syncMode": "INHERIT" }
        }
      ],
      "users": [
        {
          "username": "techgardencode",
          "email": "techgardencode+dev@techgarden.gg",
          "firstName": "TechGarden",
          "lastName": "Code",
          "enabled": true,
          "credentials": [{ "type": "password", "value": "${KC_USER_TECHGARDENCODE_PASSWORD}", "temporary": false }],
          "realmRoles": ["app_admin"],
          "clientRoles": {
            "realm-management": ["realm-admin"]
          }
        },
        {
          "username": "techgardenadmin",
          "email": "techgardenadmin+dev@techgarden.gg",
          "firstName": "TechGarden",
          "lastName": "Admin",
          "enabled": true,
          "credentials": [{ "type": "password", "value": "${KC_USER_TECHGARDENADMIN_PASSWORD}", "temporary": false }],
          "realmRoles": ["app_admin"]
        },
        {
          "username": "techgardenuser",
          "email": "techgardenuser+dev@techgarden.gg",
          "firstName": "TechGarden",
          "lastName": "User",
          "enabled": true,
          "credentials": [{ "type": "password", "value": "${KC_USER_TECHGARDENUSER_PASSWORD}", "temporary": false }]
        }
      ]
    }
  hausparty-realm.json: |
    {
      "realm": "hausparty",
      "enabled": true,
      "registrationAllowed": false,
      "roles": {
        "realm": [
          { "name": "site_admin", "description": "Hausparty site administrator" }
        ]
      },
      "clients": [
        {
          "clientId": "hausparty",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "${KC_CLIENT_HAUSPARTY_SECRET}",
          "protocol": "openid-connect",
          "publicClient": false,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false,
          "redirectUris": ["https://hausparty.dev.techgarden.gg/*", "http://localhost:3000/*"],
          "webOrigins": ["https://hausparty.dev.techgarden.gg", "http://localhost:3000"],
          "defaultClientScopes": ["openid", "basic", "profile", "email"]
        }
      ],
      "identityProviders": [
        {
          "alias": "accounts",
          "displayName": "Sign in with Accounts",
          "providerId": "oidc",
          "enabled": true,
          "trustEmail": true,
          "storeToken": false,
          "addReadTokenRoleOnCreate": false,
          "firstBrokerLoginFlowAlias": "first broker login",
          "config": {
            "issuer": "https://sso.dev.techgarden.gg/realms/accounts",
            "authorizationUrl": "https://sso.dev.techgarden.gg/realms/accounts/protocol/openid-connect/auth",
            "tokenUrl": "https://sso.dev.techgarden.gg/realms/accounts/protocol/openid-connect/token",
            "userInfoUrl": "https://sso.dev.techgarden.gg/realms/accounts/protocol/openid-connect/userinfo",
            "logoutUrl": "https://sso.dev.techgarden.gg/realms/accounts/protocol/openid-connect/logout",
            "jwksUrl": "https://sso.dev.techgarden.gg/realms/accounts/protocol/openid-connect/certs",
            "useJwksUrl": "true",
            "validateSignature": "true",
            "clientId": "broker-hausparty",
            "clientSecret": "${KC_BROKER_HAUSPARTY_SECRET}",
            "syncMode": "FORCE",
            "defaultScope": "openid profile email"
          }
        }
      ],
      "identityProviderMappers": [
        {
          "name": "hardcoded-site_admin",
          "identityProviderAlias": "accounts",
          "identityProviderMapper": "oidc-hardcoded-role-idp-mapper",
          "config": { "role": "site_admin", "syncMode": "INHERIT" }
        }
      ],
      "users": [
        {
          "username": "techgardencode",
          "email": "techgardencode+dev@techgarden.gg",
          "firstName": "TechGarden",
          "lastName": "Code",
          "enabled": true,
          "credentials": [{ "type": "password", "value": "${KC_USER_TECHGARDENCODE_PASSWORD}", "temporary": false }],
          "realmRoles": ["site_admin"],
          "clientRoles": {
            "realm-management": ["realm-admin"]
          }
        },
        {
          "username": "techgardenadmin",
          "email": "techgardenadmin+dev@techgarden.gg",
          "firstName": "TechGarden",
          "lastName": "Admin",
          "enabled": true,
          "credentials": [{ "type": "password", "value": "${KC_USER_TECHGARDENADMIN_PASSWORD}", "temporary": false }],
          "realmRoles": ["site_admin"]
        },
        {
          "username": "techgardenuser",
          "email": "techgardenuser+dev@techgarden.gg",
          "firstName": "TechGarden",
          "lastName": "User",
          "enabled": true,
          "credentials": [{ "type": "password", "value": "${KC_USER_TECHGARDENUSER_PASSWORD}", "temporary": false }]
        }
      ]
    }
