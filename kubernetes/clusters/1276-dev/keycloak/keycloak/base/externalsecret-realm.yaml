---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-realm-secrets
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: keycloak-realm-secrets
  data:
    - secretKey: hausparty-client-secret
      remoteRef:
        key: "dfc135ab-56bd-42e6-83a8-b4230112ea1e"
    # accounts realm — broker client secrets (BWS items in `homelab` project, prefix `keycloak-accounts-`)
    - secretKey: broker-hausparty-secret
      remoteRef:
        key: "66b0a67c-a9dc-4782-81af-b44200069ada"
    - secretKey: broker-kian-coffee-secret
      remoteRef:
        key: "50f80e1d-7ee1-41db-a475-b44200069b30"
    - secretKey: broker-master-secret
      remoteRef:
        key: "4ef12996-5e93-4a52-aa69-b44200069b95"
