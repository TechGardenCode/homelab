apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Versioned snapshot of the dev `kian-coffee` realm. Currently a static
# reference (no Keycloak operator reconciles it yet); replay is manual via
# the Keycloak admin console. Wrapping it in a ConfigMap satisfies the
# ApplicationSet directory generator and gives a future Keycloak operator a
# stable consumption point.
configMapGenerator:
  - name: kian-coffee-realm
    namespace: kian-coffee
    files:
      - realm.json

generatorOptions:
  disableNameSuffixHash: true
