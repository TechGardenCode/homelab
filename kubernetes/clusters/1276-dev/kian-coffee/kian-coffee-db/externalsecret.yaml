---
# Postgres superuser — used by CNPG operator for cluster admin ops.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kian-coffee-db-superuser
  namespace: kian-coffee
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: kian-coffee-db-superuser
    template:
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: postgres
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        # BWS key: kian-coffee-blog-dev-pg-superuser-password
        key: "838bc17f-8716-4955-8ef3-b44001090c87"
---
# Application role — `kian_coffee` owns the database and runs DDL via Flyway
# and DML via the Spring service. Single role per ADR (one writer, simpler).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kian-coffee-db-app-credentials
  namespace: kian-coffee
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: kian-coffee-db-app-credentials
    template:
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: kian_coffee
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        # BWS key: kian-coffee-blog-dev-pg-password
        key: "70e82941-00f9-4146-9b9d-b44001090c4a"
