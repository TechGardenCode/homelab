---
# Surfaces the four env-driven secrets the Spring service needs:
#   PG_PASSWORD       — same value as kian-coffee-db-app-credentials.password
#   BLOG_ADMIN_SUB    — Keycloak `sub` UUID of the single blog admin
#   SENTRY_DSN        — GlitchTip DSN for the kian-coffee-blog project
#
# The K8s secret produced here is named `kian-coffee-blog` to match the
# generic-service chart's release name (the chart resolves secretKeyRef.name
# from the release name).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kian-coffee-blog
  namespace: kian-coffee
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: kian-coffee-blog
  data:
    - secretKey: PG_PASSWORD
      remoteRef:
        # BWS key: kian-coffee-blog-dev-pg-password
        # Same UUID as kian-coffee-db-app-credentials.password — single
        # role, single password.
        key: "70e82941-00f9-4146-9b9d-b44001090c4a"
    - secretKey: BLOG_ADMIN_SUB
      remoteRef:
        # BWS key: kian-coffee-blog-dev-admin-sub
        # Currently '__PENDING__' — replace with the Keycloak user's sub
        # UUID after creating the user. AdminOnlyFilter rejects all writes
        # while pending (safe default).
        key: "ffe7de1b-03d7-4bd2-aec7-b4400109257a"
    - secretKey: SENTRY_DSN
      remoteRef:
        # BWS key: kian-coffee-blog-dev-glitchtip-dsn
        # Currently '__PENDING__' — replace with real DSN after creating
        # the kian-coffee-blog project on glitchtip.techgarden.gg.
        key: "91fa9ade-fdfa-4951-90f9-b440010925a5"
