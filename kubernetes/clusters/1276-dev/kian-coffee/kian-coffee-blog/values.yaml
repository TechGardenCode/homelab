image:
  repository: "ghcr.io/techgardencode/kian-coffee-blog"
  # tag: bot-managed via app-registry.yaml; do not edit by hand
  tag: "e57cef523fac64786c03046dab8109fb8d4a8dba"
ports:
  - name: main
    containerPort: 8080
service:
  type: ClusterIP
health:
  path: /actuator/health/readiness
  port: main

# Multi-path API routing happens via the standalone httproute.yaml in this
# directory (the chart's single-path HTTPRoute can't express the apex
# /api/posts + /api/media + /feed + /sitemap.xml split we need).
httpRoute:
  enabled: false

envs:
  blog:
    PG_HOST: kian-coffee-db-rw.kian-coffee.svc.cluster.local
    PG_PORT: "5432"
    PG_DB: kian_coffee
    PG_USER: kian_coffee
    FLYWAY_USER: kian_coffee
    # Keycloak runs on sso.dev.techgarden.gg; the kian-coffee realm
    # cohabits there with the techgarden realm (same instance, separate
    # realms). The issuer URI must match the JWT `iss` claim exactly.
    KEYCLOAK_ISSUER_URI: https://sso.dev.techgarden.gg/realms/kian-coffee
    SPRING_PROFILES_ACTIVE: dev
    SENTRY_ENVIRONMENT: dev
    CORS_ORIGINS: "https://kian.coffee,https://dev.kian.coffee"
    JAVA_OPTS: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC"

secretEnvs:
  blog:
    PG_PASSWORD: PG_PASSWORD
    FLYWAY_PASSWORD: PG_PASSWORD
    BLOG_ADMIN_SUB: BLOG_ADMIN_SUB
    SENTRY_DSN: SENTRY_DSN

resources:
  requests:
    cpu: 150m
    memory: 512Mi
  limits:
    memory: 1Gi

autoscaling:
  enabled: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# JVM scratch + temurin layer needs /tmp writable.
emptyDirs:
  - name: tmp
    containerPath: /tmp
