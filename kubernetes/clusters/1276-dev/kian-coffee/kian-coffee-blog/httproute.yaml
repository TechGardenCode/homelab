---
# Path-based routing: blog API + feeds + sitemap ride on the same apex as the
# frontend (which lives at dev.kian.coffee — see ../kian-coffee/values.yaml).
# One origin = no CORS preflights for first-party reads/writes.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kian-coffee-blog
  namespace: kian-coffee
  annotations:
    dns.kian.sh/provider: internal
spec:
  parentRefs:
    - name: eg-internal
      namespace: envoy-gateway-system
  hostnames:
    - dev.kian.coffee
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/posts
        - path:
            type: PathPrefix
            value: /api/media
        - path:
            type: PathPrefix
            value: /feed
        - path:
            type: Exact
            value: /sitemap.xml
      backendRefs:
        - name: kian-coffee-blog
          port: 8080
