image:
  repository: "ghcr.io/techgardencode/kian.coffee"
  tag: "ae5a00e6bb15de144c60ace877a90ac8b0b33d26"
ports:
  - name: main
    containerPort: 4000
service:
  type: ClusterIP
health:
  path: /health
# Exposure: Tier 1 (Internal only)
httpRoute:
  enabled: true
  hostname: dev.kian.coffee
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 512Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
# Paired with readOnlyRootFilesystem above. nginx needs /var/cache/nginx
# + /var/run writable at startup; /tmp is general scratch.
emptyDirs:
  - name: tmp
    containerPath: /tmp
  - name: nginx-cache
    containerPath: /var/cache/nginx
  - name: nginx-run
    containerPath: /var/run
