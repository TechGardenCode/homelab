image:
  repository: "ghcr.io/techgardencode/kian.coffee"
  tag: "8e8b77b736f13769447dc5af74fe0e67a70b2cf2"
ports:
  - name: main
    containerPort: 4000
service:
  type: ClusterIP
# SSR runtime exposes a dedicated /health endpoint for probes — the
# generic-service chart defaults to `/`, which returns a full SSR render.
health:
  path: /health
# Exposure: Tier 1 (Internal only)
httpRoute:
  enabled: true
  hostname: dev.kian.coffee
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 512Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
# Paired with readOnlyRootFilesystem above — gives Node/Angular a writable
# scratch space without exposing the rest of the image to runtime writes.
emptyDirs:
  - name: tmp
    containerPath: /tmp
