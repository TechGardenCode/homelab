image:
  repository: "ghcr.io/techgardencode/kian.coffee"
  tag: "3753c72241ed192717fc1e88e74accbb1129bb0e"
ports:
  - name: main
    containerPort: 4000
service:
  type: ClusterIP
health:
  path: /health
# Telemetry: browser SDK config is injected at pod start by
# docker/30-runtime-config.sh (in the app image) via envsubst. APP_ENV is
# deploy-driven so the same image can serve dev/prod with different labels;
# client ID + DSN come from the `kian-coffee` Secret (ExternalSecret from
# BWS). GlitchTip project `kian-coffee-dev`; OpenPanel project
# `kian-coffee-dev`.
envs:
  - APP_ENV: "dev"
secretEnvs:
  - OPENPANEL_CLIENT_ID: "openpanel-client-id"
  - GLITCHTIP_DSN: "glitchtip-dsn"
# Exposure: Tier 1 (Internal only)
httpRoute:
  enabled: true
  hostname: dev.kian.coffee
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 512Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
# Paired with readOnlyRootFilesystem above. nginx needs /var/cache/nginx
# + /var/run writable at startup; /tmp is general scratch.
emptyDirs:
  - name: tmp
    containerPath: /tmp
  - name: nginx-cache
    containerPath: /var/cache/nginx
  - name: nginx-run
    containerPath: /var/run
