apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - base/gateway-class.yaml
  - base/envoy-proxy-internal.yaml
  - base/envoy-proxy-public.yaml
  - base/pdb.yaml

helmCharts:
  - name: gateway-helm
    version: 1.7.2
    releaseName: gateway-helm
    repo: oci://docker.io/envoyproxy
    includeCRDs: true
    valuesFile: values.yaml
    namespace: envoy-gateway-system
