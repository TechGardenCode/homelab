auth:
  existingSecret: keycloak
  passwordSecretKey: password
service:
  type: LoadBalancer
ingress:
  enabled: true
  hostname: sso.dev.techgarden.gg
  ingressClassName: nginx-public
  tls: true
  annotations:
    cert-manager.io/issuer-group: certmanager.step.sm
    cert-manager.io/issuer-kind: StepClusterIssuer
    cert-manager.io/issuer: step-issuer
  extraHosts:
    - name: sso.1276.internal.dev.techgarden.gg
  extraTls:
    - secretName: sso.1276.internal.dev.techgarden.gg-tls
      hosts:
        - sso.1276.internal.dev.techgarden.gg
proxyHeaders: xforwarded
postgresql:
  enabled: false
externalDatabase:
  host: postgresql-rw.databases.svc
  port: 5432
  database: keycloak
  existingSecret: keycloak
  existingSecretPasswordKey: db-password
production: true
