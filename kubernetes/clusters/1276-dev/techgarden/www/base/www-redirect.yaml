apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: techgarden-www-redirect
  namespace: techgarden
  annotations:
    dns.kian.sh/provider: internal
spec:
  parentRefs:
    - name: eg-internal
      namespace: envoy-gateway-system
  hostnames:
    - www.dev.techgarden.gg
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            hostname: dev.techgarden.gg
            statusCode: 301
