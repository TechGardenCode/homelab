---
apiVersion: batch/v1
kind: Job
metadata:
  name: techgarden-db-provisioner
  namespace: techgarden
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  completions: 1
  parallelism: 1
  template:
    spec:
      restartPolicy: OnFailure
      terminationGracePeriodSeconds: 30
      containers:
        - name: db-provisioner
          image: postgres:18
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              HOST="techgarden-db-rw.techgarden.svc"

              echo "[$(date)] Provisioning techgarden-db users..."

              psql -h "$HOST" -U postgres -d techgarden <<'EOSQL'
              -- Blog service users
              DO $$ BEGIN
                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'blog_flyway') THEN
                  CREATE USER blog_flyway;
                END IF;
              END $$;
              DO $$ BEGIN
                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'blog_write') THEN
                  CREATE USER blog_write;
                END IF;
              END $$;
              DO $$ BEGIN
                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'blog_read') THEN
                  CREATE USER blog_read;
                END IF;
              END $$;

              -- Profile service users
              DO $$ BEGIN
                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'profile_flyway') THEN
                  CREATE USER profile_flyway;
                END IF;
              END $$;
              DO $$ BEGIN
                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'profile_write') THEN
                  CREATE USER profile_write;
                END IF;
              END $$;
              DO $$ BEGIN
                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'profile_read') THEN
                  CREATE USER profile_read;
                END IF;
              END $$;
              EOSQL

              # Set passwords (must use psql variables for safe password handling)
              psql -h "$HOST" -U postgres -d techgarden \
                -v blog_flyway_pw="$BLOG_FLYWAY_PASSWORD" \
                -v blog_write_pw="$BLOG_WRITE_PASSWORD" \
                -v blog_read_pw="$BLOG_READ_PASSWORD" \
                -v profile_flyway_pw="$PROFILE_FLYWAY_PASSWORD" \
                -v profile_write_pw="$PROFILE_WRITE_PASSWORD" \
                -v profile_read_pw="$PROFILE_READ_PASSWORD" <<'EOSQL'
              ALTER USER blog_flyway WITH PASSWORD :'blog_flyway_pw';
              ALTER USER blog_write WITH PASSWORD :'blog_write_pw';
              ALTER USER blog_read WITH PASSWORD :'blog_read_pw';
              ALTER USER profile_flyway WITH PASSWORD :'profile_flyway_pw';
              ALTER USER profile_write WITH PASSWORD :'profile_write_pw';
              ALTER USER profile_read WITH PASSWORD :'profile_read_pw';

              -- Assign roles
              GRANT blog_flyway_role TO blog_flyway;
              GRANT blog_write_role TO blog_write;
              GRANT blog_read_role TO blog_read;
              GRANT profile_flyway_role TO profile_flyway;
              GRANT profile_write_role TO profile_write;
              GRANT profile_read_role TO profile_read;

              -- Set default search paths
              ALTER USER blog_flyway SET search_path TO blog,public;
              ALTER USER blog_write SET search_path TO blog,public;
              ALTER USER blog_read SET search_path TO blog,public;
              ALTER USER profile_flyway SET search_path TO profile,public;
              ALTER USER profile_write SET search_path TO profile,public;
              ALTER USER profile_read SET search_path TO profile,public;
              EOSQL

              echo "[$(date)] User provisioning complete."
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-superuser
                  key: password
            - name: BLOG_FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-blog
                  key: flyway-password
            - name: BLOG_WRITE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-blog
                  key: write-password
            - name: BLOG_READ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-blog
                  key: read-password
            - name: PROFILE_FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-profile
                  key: flyway-password
            - name: PROFILE_WRITE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-profile
                  key: write-password
            - name: PROFILE_READ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-profile
                  key: read-password
