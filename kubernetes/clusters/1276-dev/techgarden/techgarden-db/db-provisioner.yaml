---
apiVersion: batch/v1
kind: Job
metadata:
  name: techgarden-db-provisioner
  namespace: techgarden
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  completions: 1
  parallelism: 1
  template:
    spec:
      restartPolicy: OnFailure
      terminationGracePeriodSeconds: 30
      containers:
        - name: db-provisioner
          image: postgres:18
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              HOST="techgarden-db-rw.techgarden.svc"

              echo "[$(date)] Provisioning techgarden-db users..."

              # Create users idempotently (PostgreSQL 17+ supports IF NOT EXISTS)
              psql -h "$HOST" -U postgres -d techgarden \
                -v blog_flyway_pw="$BLOG_FLYWAY_PASSWORD" \
                -v blog_write_pw="$BLOG_WRITE_PASSWORD" \
                -v blog_read_pw="$BLOG_READ_PASSWORD" \
                -v profile_flyway_pw="$PROFILE_FLYWAY_PASSWORD" \
                -v profile_write_pw="$PROFILE_WRITE_PASSWORD" \
                -v profile_read_pw="$PROFILE_READ_PASSWORD" \
                -c "CREATE USER IF NOT EXISTS blog_flyway;" \
                -c "CREATE USER IF NOT EXISTS blog_write;" \
                -c "CREATE USER IF NOT EXISTS blog_read;" \
                -c "CREATE USER IF NOT EXISTS profile_flyway;" \
                -c "CREATE USER IF NOT EXISTS profile_write;" \
                -c "CREATE USER IF NOT EXISTS profile_read;" \
                -c "ALTER USER blog_flyway WITH PASSWORD :'blog_flyway_pw';" \
                -c "ALTER USER blog_write WITH PASSWORD :'blog_write_pw';" \
                -c "ALTER USER blog_read WITH PASSWORD :'blog_read_pw';" \
                -c "ALTER USER profile_flyway WITH PASSWORD :'profile_flyway_pw';" \
                -c "ALTER USER profile_write WITH PASSWORD :'profile_write_pw';" \
                -c "ALTER USER profile_read WITH PASSWORD :'profile_read_pw';" \
                -c "GRANT blog_flyway_role TO blog_flyway;" \
                -c "GRANT blog_write_role TO blog_write;" \
                -c "GRANT blog_read_role TO blog_read;" \
                -c "GRANT profile_flyway_role TO profile_flyway;" \
                -c "GRANT profile_write_role TO profile_write;" \
                -c "GRANT profile_read_role TO profile_read;" \
                -c "ALTER USER blog_flyway SET search_path TO blog,public;" \
                -c "ALTER USER blog_write SET search_path TO blog,public;" \
                -c "ALTER USER blog_read SET search_path TO blog,public;" \
                -c "ALTER USER profile_flyway SET search_path TO profile,public;" \
                -c "ALTER USER profile_write SET search_path TO profile,public;" \
                -c "ALTER USER profile_read SET search_path TO profile,public;"

              echo "[$(date)] User provisioning complete."
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-superuser
                  key: password
            - name: BLOG_FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-blog
                  key: flyway-password
            - name: BLOG_WRITE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-blog
                  key: write-password
            - name: BLOG_READ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-blog
                  key: read-password
            - name: PROFILE_FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-profile
                  key: flyway-password
            - name: PROFILE_WRITE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-profile
                  key: write-password
            - name: PROFILE_READ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-profile
                  key: read-password
