---
apiVersion: batch/v1
kind: Job
metadata:
  name: techgarden-db-provisioner
  namespace: techgarden
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  completions: 1
  parallelism: 1
  template:
    spec:
      restartPolicy: OnFailure
      terminationGracePeriodSeconds: 30
      containers:
        - name: db-provisioner
          image: postgres:18
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              HOST="techgarden-db-rw.techgarden.svc"

              # Escape single quotes in passwords for safe SQL embedding
              esc() { printf '%s' "$1" | sed "s/'/''/g"; }

              echo "[$(date)] Provisioning techgarden-db users..."

              psql -h "$HOST" -U postgres -d techgarden <<EOSQL
              -- Create login users idempotently
              CREATE ROLE IF NOT EXISTS blog_flyway LOGIN;
              CREATE ROLE IF NOT EXISTS blog_write LOGIN;
              CREATE ROLE IF NOT EXISTS blog_read LOGIN;
              CREATE ROLE IF NOT EXISTS profile_flyway LOGIN;
              CREATE ROLE IF NOT EXISTS profile_write LOGIN;
              CREATE ROLE IF NOT EXISTS profile_read LOGIN;

              -- Set passwords
              ALTER USER blog_flyway WITH PASSWORD '$(esc "$BLOG_FLYWAY_PASSWORD")';
              ALTER USER blog_write WITH PASSWORD '$(esc "$BLOG_WRITE_PASSWORD")';
              ALTER USER blog_read WITH PASSWORD '$(esc "$BLOG_READ_PASSWORD")';
              ALTER USER profile_flyway WITH PASSWORD '$(esc "$PROFILE_FLYWAY_PASSWORD")';
              ALTER USER profile_write WITH PASSWORD '$(esc "$PROFILE_WRITE_PASSWORD")';
              ALTER USER profile_read WITH PASSWORD '$(esc "$PROFILE_READ_PASSWORD")';

              -- Assign roles
              GRANT blog_flyway_role TO blog_flyway;
              GRANT blog_write_role TO blog_write;
              GRANT blog_read_role TO blog_read;
              GRANT profile_flyway_role TO profile_flyway;
              GRANT profile_write_role TO profile_write;
              GRANT profile_read_role TO profile_read;

              -- Set default search paths
              ALTER USER blog_flyway SET search_path TO blog,public;
              ALTER USER blog_write SET search_path TO blog,public;
              ALTER USER blog_read SET search_path TO blog,public;
              ALTER USER profile_flyway SET search_path TO profile,public;
              ALTER USER profile_write SET search_path TO profile,public;
              ALTER USER profile_read SET search_path TO profile,public;
              EOSQL

              echo "[$(date)] User provisioning complete."
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-superuser
                  key: password
            - name: BLOG_FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-blog
                  key: flyway-password
            - name: BLOG_WRITE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-blog
                  key: write-password
            - name: BLOG_READ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-blog
                  key: read-password
            - name: PROFILE_FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-profile
                  key: flyway-password
            - name: PROFILE_WRITE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-profile
                  key: write-password
            - name: PROFILE_READ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-profile
                  key: read-password
