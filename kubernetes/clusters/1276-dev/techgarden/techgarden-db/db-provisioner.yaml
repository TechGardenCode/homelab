---
apiVersion: batch/v1
kind: Job
metadata:
  name: techgarden-db-provisioner
  namespace: techgarden
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  completions: 1
  parallelism: 1
  template:
    spec:
      restartPolicy: OnFailure
      terminationGracePeriodSeconds: 30
      containers:
        - name: db-provisioner
          image: postgres:18
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              HOST="techgarden-db-rw.techgarden.svc"

              # Escape single quotes in passwords for safe SQL embedding
              esc() { printf '%s' "$1" | sed "s/'/''/g"; }

              echo "[$(date)] Provisioning techgarden-db users..."

              # Phase 1: Create roles (ignore 'already exists' errors)
              psql -h "$HOST" -U postgres -d techgarden --set ON_ERROR_STOP=off <<EOSQL
              CREATE ROLE blog_flyway LOGIN;
              CREATE ROLE blog_write LOGIN;
              CREATE ROLE blog_read LOGIN;
              CREATE ROLE profile_flyway LOGIN;
              CREATE ROLE profile_write LOGIN;
              CREATE ROLE profile_read LOGIN;
              EOSQL

              # Phase 2: Set passwords, grants, search paths (must succeed)
              psql -h "$HOST" -U postgres -d techgarden --set ON_ERROR_STOP=on <<EOSQL
              ALTER ROLE blog_flyway WITH PASSWORD '$(esc "$BLOG_FLYWAY_PASSWORD")';
              ALTER ROLE blog_write WITH PASSWORD '$(esc "$BLOG_WRITE_PASSWORD")';
              ALTER ROLE blog_read WITH PASSWORD '$(esc "$BLOG_READ_PASSWORD")';
              ALTER ROLE profile_flyway WITH PASSWORD '$(esc "$PROFILE_FLYWAY_PASSWORD")';
              ALTER ROLE profile_write WITH PASSWORD '$(esc "$PROFILE_WRITE_PASSWORD")';
              ALTER ROLE profile_read WITH PASSWORD '$(esc "$PROFILE_READ_PASSWORD")';
              GRANT blog_flyway_role TO blog_flyway;
              GRANT blog_write_role TO blog_write;
              GRANT blog_read_role TO blog_read;
              GRANT profile_flyway_role TO profile_flyway;
              GRANT profile_write_role TO profile_write;
              GRANT profile_read_role TO profile_read;
              ALTER ROLE blog_flyway SET search_path TO blog,public;
              ALTER ROLE blog_write SET search_path TO blog,public;
              ALTER ROLE blog_read SET search_path TO blog,public;
              ALTER ROLE profile_flyway SET search_path TO profile,public;
              ALTER ROLE profile_write SET search_path TO profile,public;
              ALTER ROLE profile_read SET search_path TO profile,public;
              EOSQL

              echo "[$(date)] User provisioning complete."
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-superuser
                  key: password
            - name: BLOG_FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-blog
                  key: flyway-password
            - name: BLOG_WRITE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-blog
                  key: write-password
            - name: BLOG_READ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-blog
                  key: read-password
            - name: PROFILE_FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-profile
                  key: flyway-password
            - name: PROFILE_WRITE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-profile
                  key: write-password
            - name: PROFILE_READ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: techgarden-db-profile
                  key: read-password
