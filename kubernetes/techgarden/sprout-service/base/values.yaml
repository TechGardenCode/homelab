image:
  repository: "ghcr.io/techgardencode/sprout-service"
  tag: "latest@sha256:6446d64ae6d64d18442cf0ac6b94c4917c3e5c3a63ced1502fcf2df2228de3a6"

health:
  path: /health

ports:
  - name: main
    containerPort: 3000

service:
  type: LoadBalancer

ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  host: sprout.api.techgarden.gg
  tls:
    secretName: sprout-service-techgarden-gg-tls
